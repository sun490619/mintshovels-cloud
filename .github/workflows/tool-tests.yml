name: 功能测试

on:
  push:
    paths:
      - 'tools/**'
      - 'test_tools.mjs'
  workflow_dispatch:

jobs:
  test-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install playwright
      
      - name: 安装 Chromium
        run: npx playwright install chromium
      
      - name: 启动本地服务器
        run: |
          npx serve -l 8765 --no-clipboard --no-request-logging &
          sleep 3
          # 验证服务器是否启动成功
          for i in 1 2 3 4 5; do
            if curl -s http://localhost:8765/ > /dev/null 2>&1; then
              echo "✅ 本地服务器已启动 (端口 8765)"
              break
            fi
            echo "⏳ 等待服务器启动... ($i/5)"
            sleep 2
          done
          curl -s http://localhost:8765/ > /dev/null 2>&1 || { echo "❌ 服务器启动失败"; exit 1; }
      
      - name: 运行功能测试
        run: node test_tools.mjs
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:8765' }}
      
      - name: 提交测试结果
        run: |
          git config user.name "MintShovels Bot"
          git config user.email "bot@mintshovels.com"
          git add test_results.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "测试结果无变化"
          else
            git commit -m "🧪 功能测试结果更新"
            git push
          fi
