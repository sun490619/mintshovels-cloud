name: 🚀 Auto Deploy — Railway + CF Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: 📦 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Build Safeguard
        run: |
          echo "🔒 校验工具数据纯净度..."
          python3 scripts/build_safeguard.py

      - name: 📊 Pre-deploy summary
        run: |
          echo "### 🚀 MintShovels Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  deploy-cf-pages:
    name: 🌐 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && !cancelled() && needs.deploy.result != 'skipped'
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "📤 上传文件到 Cloudflare Pages..."
          npx wrangler@latest pages deploy . \
            --project-name=mintshovels \
            --branch=main \
            --commit-dirty=true \
            2>&1 | tee deploy_log.txt
          
          echo ""
          echo "### ✅ CF Pages 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -5 deploy_log.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "🌍 https://mintshovels.com" >> $GITHUB_STEP_SUMMARY

  notify:
    name: 📢 Deploy Complete
    runs-on: ubuntu-latest
    needs: deploy-cf-pages
    if: always()
    steps:
      - name: ✅ Summary
        run: |
          if [ "${{ needs.deploy-cf-pages.result }}" = "success" ]; then
            echo "✅ **全部部署成功** — mintshovels.com 已更新" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **部署异常** — 请检查日志" >> $GITHUB_STEP_SUMMARY
          fi
