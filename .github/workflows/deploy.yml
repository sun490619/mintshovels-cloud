name: 🚀 Auto Deploy — Railway + CF Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: 📦 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Build Safeguard
        run: |
          echo "🔒 校验工具数据纯净度..."
          python3 scripts/build_safeguard.py

      - name: 📊 Pre-deploy summary
        run: |
          echo "### 🚀 MintShovels Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  deploy-cf-pages:
    name: 🌐 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && !cancelled() && needs.deploy.result != 'skipped'
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🚀 Deploy to Cloudflare Pages
        id: cf_deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "📤 上传文件到 Cloudflare Pages..."
          npx wrangler@latest pages deploy . \
            --project-name=mintshovels \
            --branch=main \
            --commit-dirty=true \
            2>&1 | tee deploy_log.txt
          WRANGLER_EXIT=${PIPESTATUS[0]}
          echo "wrangler_exit=$WRANGLER_EXIT" >> $GITHUB_OUTPUT
          
          echo ""
          if [ "$WRANGLER_EXIT" = "0" ]; then
            echo "### ✅ CF Pages 部署成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ wrangler 部署跳过 — 如 CF 已直连 GitHub 则自动部署生效" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -5 deploy_log.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "🌍 https://mintshovels.com" >> $GITHUB_STEP_SUMMARY

  notify:
    name: 📢 Deploy Complete
    runs-on: ubuntu-latest
    needs: deploy-cf-pages
    if: always()
    steps:
      - name: ✅ Summary
        run: |
          DEPLOY_RESULT="${{ needs.deploy-cf-pages.result }}"
          if [ "$DEPLOY_RESULT" = "success" ]; then
            echo "✅ **部署完成** — mintshovels.com 已更新" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **wrangler 状态: $DEPLOY_RESULT** — CF 直连 GitHub 则 Push 即部署" >> $GITHUB_STEP_SUMMARY
          fi
