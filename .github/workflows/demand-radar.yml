name: Demand Radar Auto Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape-generate-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Step 1 Scrape
        run: |
          python3 demand_scraper.py --limit 15 --no-pipeline
      - name: Step 2 Classify
        run: python3 demand_pipeline.py --auto-run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Step 3 Generate Tools
        run: python3 tool_generator.py
      - name: Step 4 Commit
        run: |
          git config user.name "MintShovels Bot"
          git config user.email "bot@mintshovels.com"
          git add scraper_cache.json scraper_seen.json demand_report.json review_queue.json mistake_book.json 2>/dev/null || true
          git add tools/auto_*.html generated_tools_log.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
      - name: Step 5 Deploy
        if: success()
        continue-on-error: true
        run: |
          npm install -g wrangler@latest 2>/dev/null
          npx wrangler pages deploy tools/ --project-name=mintshovels --branch=tools
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
