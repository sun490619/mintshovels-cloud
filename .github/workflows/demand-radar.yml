name: 需求雷达

on:
  schedule:
    # 每2小时跑一次 (UTC时间, 北京时间+8)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  scrape-and-classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 运行需求雷达
        run: |
          python3 demand_scraper.py --limit 15
      
      - name: 提交结果
        run: |
          git config user.name "MintShovels Bot"
          git config user.email "bot@mintshovels.com"
          git add scraper_cache.json scraper_seen.json demand_report.json review_queue.json mistake_book.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "📭 无新增数据"
          else
            git commit -m "🤖 需求雷达自动更新 [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
