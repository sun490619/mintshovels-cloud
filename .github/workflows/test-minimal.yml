name: Test Minimal

on:
  push:
    paths:
      - '.github/workflows/test-minimal.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 🔍 Step 1 Test with emoji
        run: |
          echo "Hello from GitHub Actions!"
          python3 --version
          ls -la
      
      - name: 中文步骤名测试
        run: echo "Chinese step name works"

      - name: Multi-line Python inline
        run: |
          python3 -c "
          import json
          print('JSON imported OK')
          " 2>/dev/null || echo "INLINE PYTHON FAILED"
