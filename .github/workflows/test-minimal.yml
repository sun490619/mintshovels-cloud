name: Test Minimal

on:
  push:
    paths:
      - '.github/workflows/test-minimal.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test
        run: |
          echo "Hello from GitHub Actions!"
          python3 --version
          ls -la
