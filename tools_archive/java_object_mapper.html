<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Java Object Mapper Code Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:40px 20px}
.container{max-width:880px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:12px}
.row{display:flex;gap:10px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.row label{font-size:12px;color:#8b949e;min-width:60px}
input,select{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#c9d1d9;font-size:12px;outline:none;font-family:'SF Mono',Monaco,monospace}
input:focus,select:focus{border-color:#58a6ff}
.fields{display:flex;flex-direction:column;gap:4px;margin:10px 0}
.field-row{display:flex;gap:6px;align-items:center}
.field-row input{flex:1}
.field-row .rm{background:#3d1a1a;border:1px solid #da3633;color:#f85149;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
pre{background:#0d1117;border:1px solid #3fb950;border-radius:6px;padding:16px;font-size:12px;overflow:auto;max-height:500px;font-family:'SF Mono',Monaco,monospace;line-height:1.5;white-space:pre}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;margin-top:8px}
.btn:hover{background:#2ea043}
.btn.s{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.s:hover{background:#30363d}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.mapping-hint{font-size:11px;color:#484f58;margin:4px 0}
</style>
</head>
<body>
<div class="container">
<h1>🔄 Java Object Mapper Code Generator</h1>
<p class="sub">定义源对象和目标对象的字段映射 → 自动生成 Java 转换代码</p>

<div class="box">
<div class="row">
<label>源类名:</label><input id="srcClass" value="UserDTO" style="width:120px">
<label>目标类名:</label><input id="dstClass" value="UserEntity" style="width:120px">
<label>包名:</label><input id="package" value="com.example.mapper" style="width:160px">
</div>
<div class="row">
<label>映射风格:</label>
<select id="style" onchange="generate()">
<option value="manual">手动字段映射</option>
<option value="builder">Builder 模式</option>
<option value="stream">Stream + Lambda</option>
</select>
</div>

<h3 style="margin-top:12px">📋 字段映射</h3>
<p class="mapping-hint">格式: 源字段名 → 目标字段名 (类型)</p>
<div class="fields" id="fieldsList">
<div class="field-row"><input value="id" placeholder="源字段"><span style="color:#8b949e">→</span><input value="id" placeholder="目标字段"><input value="Long" style="width:70px" placeholder="类型"><button class="rm" onclick="removeField(this)">✕</button></div>
<div class="field-row"><input value="userName" placeholder="源字段"><span style="color:#8b949e">→</span><input value="name" placeholder="目标字段"><input value="String" style="width:70px"><button class="rm" onclick="removeField(this)">✕</button></div>
<div class="field-row"><input value="emailAddress" placeholder="源字段"><span style="color:#8b949e">→</span><input value="email" placeholder="目标字段"><input value="String" style="width:70px"><button class="rm" onclick="removeField(this)">✕</button></div>
<div class="field-row"><input value="age" placeholder="源字段"><span style="color:#8b949e">→</span><input value="age" placeholder="目标字段"><input value="Integer" style="width:70px"><button class="rm" onclick="removeField(this)">✕</button></div>
</div>
<button class="btn s" onclick="addField()">+ 添加字段</button>
<button class="btn" onclick="generate()" style="float:right">⚡ 生成</button>
</div>

<div class="box">
<h3>📤 Java 代码</h3>
<pre id="output">点击"生成"按钮...</pre>
<button class="btn s" onclick="copyResult()">📋 复制</button>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
function addField(){
  let list=document.getElementById('fieldsList');
  let div=document.createElement('div');div.className='field-row';
  div.innerHTML='<input placeholder="源字段"><span style="color:#8b949e">→</span><input placeholder="目标字段"><input style="width:70px" placeholder="类型"><button class="rm" onclick="removeField(this)">✕</button>';
  list.appendChild(div);
}
function removeField(btn){btn.closest('.field-row').remove();}

function generate(){
  let srcClass=document.getElementById('srcClass').value||'SourceDTO';
  let dstClass=document.getElementById('dstClass').value||'TargetEntity';
  let pkg=document.getElementById('package').value||'com.example.mapper';
  let style=document.getElementById('style').value;
  let rows=document.querySelectorAll('.field-row');
  let fields=[];
  rows.forEach(r=>{
    let ins=r.querySelectorAll('input');
    let src=ins[0].value.trim(),dst=ins[1].value.trim(),type=ins[2].value.trim();
    if(src&&dst)fields.push({src,dst,type:type||'String'});
  });

  let code=`package ${pkg};\n\nimport java.util.List;\nimport java.util.stream.Collectors;\n\n/**\n * ${srcClass} → ${dstClass} 对象映射器\n * 自动生成于 ${new Date().toLocaleString('zh-CN')}\n */\npublic class ${srcClass}To${dstClass}Mapper {\n\n`;

  if(style==='manual'){
code+=`    public static ${dstClass} map(${srcClass} src) {\n        if (src == null) return null;\n        ${dstClass} dst = new ${dstClass}();\n`;
    fields.forEach(f=>{
      code+=`        dst.set${cap(f.dst)}(src.get${cap(f.src)}());\n`;
    });
code+=`        return dst;\n    }\n\n    public static List<${dstClass}> mapList(List<${srcClass}> srcList) {\n        if (srcList == null) return null;\n        return srcList.stream()\n            .map(${srcClass}To${dstClass}Mapper::map)\n            .collect(Collectors.toList());\n    }\n`;
  }else if(style==='builder'){
code+=`    public static ${dstClass} map(${srcClass} src) {\n        if (src == null) return null;\n        return ${dstClass}.builder()\n`;
    fields.forEach(f=>{
      code+=`            .${f.dst}(src.get${cap(f.src)}())\n`;
    });
code+=`            .build();\n    }\n`;
  }else if(style==='stream'){
code+=`    public static ${dstClass} map(${srcClass} src) {\n        if (src == null) return null;\n        ${dstClass} dst = new ${dstClass}();\n`;
    fields.forEach(f=>{
      let type=f.type.toLowerCase();
      let wrap=type==='integer'||type==='int'?'Integer':type==='long'?'Long':'String';
      code+=`        dst.set${cap(f.dst)}(Optional.ofNullable(src.get${cap(f.src)}())\n                .orElse(null));\n`;
    });
code+=`        return dst;\n    }\n\n    public static List<${dstClass}> mapList(List<${srcClass}> srcList) {\n        return srcList.stream()\n            .filter(src -> src != null)\n            .map(${srcClass}To${dstClass}Mapper::map)\n            .collect(Collectors.toList());\n    }\n`;
  }

code+=`}`;
  document.getElementById('output').textContent=code;
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function copyResult(){navigator.clipboard.writeText(document.getElementById('output').textContent);showToast('已复制!');}
function showToast(msg){let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',1500);}
generate();
</script>
</body>
</html>
