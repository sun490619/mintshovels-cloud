<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>World Map Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;padding:40px 20px}
.container{max-width:700px;width:100%}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
.controls label{font-size:12px;color:#8b949e;display:block;margin-bottom:4px}
.controls input[type=range]{width:120px}
.controls input[type=number]{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#c9d1d9;width:80px;outline:none}
.controls input:focus{border-color:#58a6ff}
canvas{border-radius:8px;display:block;margin:0 auto;border:1px solid #30363d}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;margin-top:8px}
.btn:hover{background:#2ea043}
.btn.s{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.s:hover{background:#30363d}
.info{font-size:11px;color:#484f58;text-align:center;margin-top:8px}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>🗺️ World Map Generator (Perlin Noise)</h1>
<p class="sub">基于 Perlin 噪声生成随机世界地图 · 可调参数 · 下载 PNG</p>

<div class="controls">
<div><label>种子</label><input type="number" id="seed" value="42" min="1" onchange="generate()"></div>
<div><label>比例</label><input type="range" id="scale" value="6" min="2" max="15" onchange="generate()"></div>
<div><label>海平面</label><input type="range" id="seaLevel" value="45" min="20" max="80" onchange="generate()"></div>
<button class="btn" onclick="generate()">🎲 重新生成</button>
<button class="btn s" onclick="download()">📥 下载 PNG</button>
</div>

<canvas id="canvas" width="600" height="300"></canvas>
<p class="info">🟢 陆地 · 🔵 海洋 · ⬜ 沙滩 · 🟤 山脉 | 每点都是 Perlin 噪声计算</p>
</div>
<div class="toast" id="toast"></div>

<script>
const W=600,H=300;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

// Simple value noise (fast approximation of Perlin)
function noise2D(x,y,perm){
  let X=Math.floor(x)&255,Y=Math.floor(y)&255;
  x-=Math.floor(x);y-=Math.floor(y);
  let u=fade(x),v=fade(y);
  let a=perm[perm[X]+Y],b=perm[perm[X+1]+Y];
  let c=perm[perm[X]+Y+1],d=perm[perm[X+1]+Y+1];
  return lerp(v,lerp(u,grad(a,x,y),grad(b,x-1,y)),lerp(u,grad(c,x,y-1),grad(d,x-1,y-1)));
}
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(t,a,b){return a+t*(b-a);}
function grad(hash,x,y){
  let h=hash&3;
  return (h<2?x:-x)+(h%2?y:-y);
}

function buildPerm(seed){
  let p=new Array(512);
  let base=[];
  for(let i=0;i<256;i++)base[i]=i;
  // Simple seeded shuffle
  let s=seed;
  for(let i=255;i>0;i--){
    s=(s*16807+0)%2147483647;
    let j=s%(i+1);
    [base[i],base[j]]=[base[j],base[i]];
  }
  for(let i=0;i<512;i++)p[i]=base[i&255];
  return p;
}

let perm=buildPerm(42);

function generate(){
  let seed=parseInt(document.getElementById('seed').value)||42;
  let scale=parseFloat(document.getElementById('scale').value)||6;
  let seaLevel=parseInt(document.getElementById('seaLevel').value)/100||0.45;

  perm=buildPerm(seed);
  let imgData=ctx.createImageData(W,H);
  let data=imgData.data;
  let min=Infinity,max=-Infinity;
  let values=[];

  for(let y=0;y<H;y++){
    values[y]=[];
    for(let x=0;x<W;x++){
      // Multiple octaves for better terrain
      let val=0;
      let amp=1, freq=1,total=0;
      let sx=x/W*scale, sy=y/H*scale;
      for(let o=0;o<4;o++){
        val+=noise2D(sx*freq,sy*freq,perm)*amp;
        total+=amp;
        amp*=0.5;freq*=2;
      }
      val/=total;
      values[y][x]=val;
      if(val<min)min=val;
      if(val>max)max=val;
    }
  }

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      let v=(values[y][x]-min)/(max-min);
      let i=(y*W+x)*4;
      let r,g,b;

      if(v<seaLevel-0.08){r=25;g=50;b=120;} // deep ocean
      else if(v<seaLevel-0.02){r=30;g=80;b=180;} // shallow water
      else if(v<seaLevel){r=180;g=200;b=200;} // beach
      else if(v<seaLevel+0.08){r=60;g=160;b=60;} // grass
      else if(v<seaLevel+0.2){r=40;g=130;b=40;} // forest
      else if(v<seaLevel+0.35){r=100;g=90;b=70;} // hills
      else if(v<seaLevel+0.5){r=130;g=120;b=100;} // highland
      else{r=180;g=170;b=160;} // mountain

      data[i]=r;data[i+1]=g;data[i+2]=b;data[i+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
  showToast(`地图已生成 · 种子: ${seed}`);
}

function download(){
  canvas.toBlob(b=>{
    let url=URL.createObjectURL(b);
    let a=document.createElement('a');a.href=url;a.download='world-map.png';a.click();
    URL.revokeObjectURL(url);
    showToast('PNG 已下载!');
  });
}

function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
generate();
</script>
</body>
</html>
