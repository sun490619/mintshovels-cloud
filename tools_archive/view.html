<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Viewer | MintShovels</title>
<meta name="description" content="MintShovels dynamic tool viewer - browse all factory tools">
<link rel="canonical" href="https://mintshovels.com/tools/view.html">
<style>
:root { --bg:#09090b; --card:#18181b; --border:#27272a; --text:#fafafa; --muted:#a1a1aa; --dim:#71717a; --accent:#6366f1; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; min-height:100vh; }
nav { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:1px solid var(--border); background:rgba(9,9,11,0.9); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
nav a { color:var(--muted); text-decoration:none; font-size:14px; }
nav a:hover { color:var(--text); }
nav .logo { font-size:18px; font-weight:700; background:linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
main { max-width:860px; margin:0 auto; padding:32px 20px; }
/* Stats */
.stats { display:flex; gap:24px; padding:16px 20px; background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:20px; flex-wrap:wrap; }
.stat { text-align:center; min-width:60px; }
.stat .v { font-size:24px; font-weight:700; color:var(--accent); }
.stat .l { font-size:11px; color:var(--dim); margin-top:2px; }
/* Search */
.search { margin-bottom:20px; }
.search input { width:100%; padding:12px 18px; background:var(--card); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:15px; outline:none; }
.search input:focus { border-color:var(--accent); }
.search input::placeholder { color:var(--dim); }
/* Category filter */
.cats { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
.cat { padding:6px 14px; border-radius:9999px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; }
.cat:hover { color:var(--text); border-color:var(--dim); }
.cat.active { background:var(--accent); color:#fff; border-color:var(--accent); }
/* Tool list */
.list { display:flex; flex-direction:column; gap:10px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 24px; display:flex; align-items:center; gap:16px; transition:border-color 0.15s; cursor:pointer; }
.card:hover { border-color:var(--accent); }
.card .icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.card .info { flex:1; min-width:0; }
.card .name { font-size:15px; font-weight:600; margin-bottom:1px; }
.card .zh { font-size:13px; color:var(--muted); margin-bottom:4px; }
.card .desc { font-size:12px; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card .meta { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.card .badge { padding:3px 10px; border-radius:9999px; font-size:10px; font-weight:600; background:rgba(99,102,241,0.1); color:#818cf8; border:1px solid rgba(99,102,241,0.2); }
.card .link { font-size:12px; color:var(--accent); text-decoration:none; }
.card .link:hover { text-decoration:underline; }
.empty { text-align:center; padding:80px 20px; }
.empty .icon { font-size:56px; opacity:0.25; margin-bottom:16px; }
.empty p { color:var(--dim); font-size:14px; }
@media (max-width:600px) {
  main { padding:20px 12px; }
  .card { flex-wrap:wrap; }
  .card .meta { flex-direction:row; width:100%; justify-content:space-between; }
}
</style>
</head>
<body>
<nav><a href="../index.html" class="logo">⬡ MintShovels</a><a href="../index.html">← 返回工厂</a></nav>
<main id="root"><div class="empty"><div class="icon">🔍</div><p>Loading tools...</p></div></main>

<script>
// ═══════ TOOLS DB ═══════
var TOOLS = (function(){
  var raw = [];
  try { raw = JSON.parse(localStorage.getItem('mstools_cache')||'[]'); } catch(e){}
  return raw;
})();

function loadFromParent(){
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '../index.html', true);
    xhr.onload = function(){
      if(xhr.status!==200) return render([]);
      var html = xhr.responseText;
      var re = /id:\s*"([^"]+)"\s*,\s*name:\s*"([^"]+)"\s*,\s*name_zh:\s*"([^"]*)"/g;
      var tools = []; var m;
      while((m=re.exec(html))!==null){
        var block = html.substring(m.index, html.indexOf('}', m.index)+300);
        var descM = block.match(/desc:\s*"([^"]*)"/);
        var descZhM = block.match(/desc_zh:\s*"([^"]*)"/);
        var iconM = block.match(/icon:\s*"([^"]*)"/);
        var colorM = block.match(/color:\s*"([^"]*)"/);
        var catM = block.match(/category:\s*"([^"]*)"/);
        var subcatM = block.match(/subcat:\s*"([^"]*)"/);
        var typeM = block.match(/type:\s*"([^"]*)"/);
        var statusM = block.match(/status:\s*"([^"]*)"/);
        var badgeM = block.match(/badge:\s*"([^"]*)"/);
        var tagsM = block.match(/tags:\s*\[([^\]]*)\]/);
        var tagsZhM = block.match(/tags_zh:\s*\[([^\]]*)\]/);
        var readyM = block.match(/ready:\s*true/);
        tools.push({
          id: m[1], name: m[2], name_zh: m[3],
          desc: descM?descM[1]:'', desc_zh: descZhM?descZhM[1]:'',
          icon: iconM?iconM[1]:'wrench', color: colorM?colorM[1]:'#6366f1',
          category: catM?catM[1]:'other', subcat: subcatM?subcatM[1]:'', type: typeM?typeM[1]:'tool',
          status: statusM?statusM[1]:'live', badge: badgeM?badgeM[1]:'',
          tags: tagsM?tagsM[1].replace(/"/g,'').split(',').map(function(s){return s.trim()}):[],
          tags_zh: tagsZhM?tagsZhM[1].replace(/"/g,'').split(',').map(function(s){return s.trim()}):[],
          ready: !!readyM
        });
      }
      try { localStorage.setItem('mstools_cache', JSON.stringify(tools)); } catch(e){}
      render(tools);
    };
    xhr.onerror = function(){ render([]); };
    xhr.send();
  } catch(e){ render([]); }
}

var allTools = [], activeCat = 'all', searchQ = '';

function render(tools){
  allTools = tools;
  if(!tools.length){
    document.getElementById('root').innerHTML = '<div class="empty"><div class="icon">📭</div><p>No tools found</p></div>';
    return;
  }
  // stats
  var cats = {}, types = {};
  tools.forEach(function(t){
    cats[t.category] = (cats[t.category]||0)+1;
    types[t.type] = (types[t.type]||0)+1;
  });
  var catNames = Object.keys(cats).sort();
  var html = '<div class="stats">'+
    '<div class="stat"><div class="v">'+tools.length+'</div><div class="l">Total Tools</div></div>'+
    '<div class="stat"><div class="v">'+Object.keys(types).length+'</div><div class="l">Types</div></div>'+
    '<div class="stat"><div class="v">'+tools.filter(function(t){return t.ready}).length+'</div><div class="l">Ready</div></div>'+
    '</div>';
  html += '<div class="search"><input id="search" type="text" placeholder="🔍 Search tools by name, description, tags..." oninput="onSearch(this.value)"></div>';
  html += '<div class="cats">';
  html += '<span class="cat'+(activeCat==='all'?' active':'')+'" onclick="onCat(\'all\')">All</span>';
  catNames.forEach(function(c){
    html += '<span class="cat'+(activeCat===c?' active':'')+'" onclick="onCat(\''+c+'\')">'+c+' ('+cats[c]+')</span>';
  });
  html += '</div><div class="list" id="list"></div>';
  document.getElementById('root').innerHTML = html;
  filterTools();
}

function filterTools(){
  var filtered = allTools.filter(function(t){
    if(activeCat!=='all' && t.category!==activeCat) return false;
    if(!searchQ) return true;
    var q = searchQ.toLowerCase();
    return (t.name.toLowerCase().indexOf(q)!==-1 || t.name_zh.indexOf(q)!==-1 ||
            t.desc.toLowerCase().indexOf(q)!==-1 || t.desc_zh.indexOf(q)!==-1 ||
            t.tags.some(function(tg){return tg.toLowerCase().indexOf(q)!==-1}) ||
            t.tags_zh.some(function(tg){return tg.indexOf(q)!==-1}));
  });
  var list = document.getElementById('list');
  if(!list) return;
  if(!filtered.length){
    list.innerHTML = '<div class="empty"><div class="icon">🔎</div><p>No tools match your search</p></div>';
    return;
  }
  var icons = {braces:'{}',wrench:'🔧',database:'🗄','file-text':'📄','pen-tool':'✒','sparkles':'✨',
    globe:'🌐','user-plus':'👤','mouse-pointer-click':'🖱','check-check':'✅',send:'📤',
    'list-checks':'📋',gauge:'⏱',image:'🖼',sheet:'📊',spider:'🕷',
    'clipboard-list':'📋','layout-dashboard':'📐',code:'💻',file:'📁',
    video:'🎬',music:'🎵',keyboard:'⌨',search:'🔍',download:'⬇','arrow-up':'⬆',link:'🔗',
    calendar:'📅',clock:'🕐',star:'⭐',heart:'❤',bookmark:'🔖',tag:'🏷',hash:'#',
    shield:'🛡',lock:'🔒',key:'🔑',mail:'📧',phone:'📱',map:'🗺',scissors:'✂',
    'cloud-upload':'☁',play:'▶',pause:'⏸',stop:'⏹',settings:'⚙',sliders:'🎚',
    'bar-chart':'📊','pie-chart':'🥧','line-chart':'📈','arrow-right':'→'
  };
  list.innerHTML = filtered.map(function(t){
    var ico = icons[t.icon] || '🔧';
    return '<div class="card" onclick="openTool(\''+t.id+'\')">'+
      '<div class="icon" style="background:'+t.color+'20;color:'+t.color+'">'+ico+'</div>'+
      '<div class="info">'+
        '<div class="name">'+t.name+'</div>'+
        '<div class="zh">'+t.name_zh+'</div>'+
        '<div class="desc">'+t.desc+'</div>'+
      '</div>'+
      '<div class="meta">'+
        (t.badge?'<span class="badge">'+t.badge+'</span>':'')+
        '<a class="link" href="../index.html?tool='+t.id+'" onclick="event.stopPropagation()">Open →</a>'+
      '</div>'+
    '</div>';
  }).join('');
}

function onSearch(v){ searchQ = v; filterTools(); }
function onCat(c){
  activeCat = c;
  document.querySelectorAll('.cat').forEach(function(el){
    el.classList.toggle('active', el.textContent.startsWith(c));
  });
  filterTools();
}
function openTool(id){ window.location.href = '../index.html?tool='+id; }

// Init
loadFromParent();
</script>
</body>
</html>
