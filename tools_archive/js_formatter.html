<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JavaScript Code Formatter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;padding:40px 20px}
.container{max-width:900px;width:100%}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.panels{grid-template-columns:1fr}}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:10px}
textarea{width:100%;min-height:260px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;color:#c9d1d9;font-family:'SF Mono',Monaco,monospace;font-size:12px;resize:vertical;outline:none}
textarea:focus{border-color:#58a6ff}
pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:14px;font-size:12px;overflow:auto;max-height:400px;font-family:'SF Mono',Monaco,monospace;line-height:1.5;white-space:pre}
.controls{margin:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500}
.btn:hover{background:#2ea043}
.btn.copy{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.copy:hover{background:#30363d}
.btn.sample{background:#1f2937;border:1px solid #374151;color:#9ca3af;font-size:12px;padding:6px 12px}
select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;font-size:13px;outline:none}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>🎨 JavaScript Code Formatter / Unminify</h1>
<p class="sub">压缩变可读 · 混淆变清晰 · 一键格式化</p>

<div class="controls">
<select id="indent" onchange="format()"><option value="2">缩进: 2空格</option><option value="4">缩进: 4空格</option><option value="tab">缩进: Tab</option></select>
<button class="btn sample" onclick="loadSample()">📎 加载混淆示例</button>
</div>

<div class="panels">
<div class="box">
<h3>📥 压缩/混淆代码</h3>
<textarea id="input">function add(a,b){return a+b;}const greet=n=>`Hello ${n}`;let arr=[1,2,3].map(x=>x*2);</textarea>
<button class="btn" onclick="format()">⚡ 格式化</button>
</div>
<div class="box">
<h3>📤 格式化结果</h3>
<pre id="output">等待格式化...</pre>
<button class="btn copy" onclick="copyResult()" style="float:right;margin-top:8px">📋 复制</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
function loadSample(){
  document.getElementById('input').value=`const a=1;function f(x,y){if(x>y){return x;}return y;}class P{constructor(n){this.name=n;}say(){console.log('Hi '+this.name);}}let r=[1,2,3].filter(x=>x>1).map(x=>x*10);const o={a:1,b:2,c:()=>3};export default f;`;
  format();
}

function jsBeautify(code,indentSize){
  let indent=' '.repeat(indentSize);
  if(indentSize==='tab')indent='\t';
  if(typeof indentSize==='string')indent='  ';

  let out='',level=0;
  let i=0;

  function getIndent(){return indent.repeat(level);}

  while(i<code.length){
    let c=code[i];

    // Skip whitespace at start
    while(i<code.length&&/\s/.test(code[i])&&code[i]!=='\n')i++;
    if(i>=code.length)break;
    c=code[i];

    // Handle strings
    if(c==="'"||c==='"'||c==='`'){
      let quote=c,str=c;
      i++;
      while(i<code.length&&code[i]!==quote){
        if(code[i]==='\\'){str+=code[i];i++;str+=code[i];i++;}
        else{str+=code[i];i++;}
      }
      if(i<code.length){str+=code[i];i++;}
      out+=str;
      continue;
    }

    // Template literal
    if(c==='`'){
      let str='`';i++;
      while(i<code.length&&code[i]!=='`'){str+=code[i];i++;}
      if(i<code.length){str+='`';i++;}
      out+=str;
      continue;
    }

    // Comments
    if(c==='/'&&code[i+1]==='/'){
      while(i<code.length&&code[i]!=='\n'){out+=code[i];i++;}
      continue;
    }
    if(c==='/'&&code[i+1]==='*'){
      out+='/*';i+=2;
      while(i<code.length-1&&!(code[i]==='*'&&code[i+1]==='/')){out+=code[i];i++;}
      if(i<code.length-1){out+='*/';i+=2;}
      continue;
    }

    // Opening braces
    if(c==='{'||c==='('||c==='['){
      out+=c;
      if(c==='{'){out+='\n';level++;out+=getIndent();}
      i++;
      continue;
    }

    // Closing braces
    if(c==='}'||c===')'||c===']'){
      if(c==='}'){
        level--;
        out=out.trimEnd();
        out+='\n'+getIndent();
      }
      out+=c;
      if(c==='}'){out+='\n';if(level>0)out+=getIndent();}
      i++;
      continue;
    }

    // Semicolons
    if(c===';'){
      out+=';\n'+getIndent();
      i++;
      // skip whitespace after semicolon
      while(i<code.length&&/\s/.test(code[i])&&code[i]!=='\n')i++;
      continue;
    }

    // Commas (for arrays/objects)
    if(c===','){
      out+=', ';
      i++;
      continue;
    }

    // Keywords that start new blocks
    let word='';
    while(i<code.length&&/[a-zA-Z0-9_$]/.test(code[i])){word+=code[i];i++;}
    if(word){
      out+=word;
      if(['function','class','if','else','for','while','switch','try','catch','finally','do','with'].includes(word)){
        out+=' ';
      }
      if(word==='return'||word==='throw'||word==='yield'||word==='await')out+=' ';
      if(word==='const'||word==='let'||word==='var')out+=' ';
      if(word==='new'||word==='typeof'||word==='instanceof'||word==='delete')out+=' ';
      if(word==='import'||word==='export'||word==='from')out+=' ';
      if(word==='case'||word==='default')out+=' ';
      continue;
    }

    // Operators
    if(/[+\-*/%=<>!&|^~?:]/.test(c)){
      out+=' '+c+' ';
      i++;
      if(code[i]==='='||code[i]===c){out+=code[i];i++;}
      continue;
    }

    // Dots
    if(c==='.'){
      out+='.';
      i++;
      continue;
    }

    // Default
    out+=c;
    i++;
  }

  return out.trim();
}

function format(){
  let code=document.getElementById('input').value;
  let indentVal=document.getElementById('indent').value;
  let indentSize=indentVal==='tab'?'tab':parseInt(indentVal);
  try{
    let result=jsBeautify(code,indentSize);
    document.getElementById('output').textContent=result;
  }catch(e){
    document.getElementById('output').textContent='格式化出错: '+e.message+'\n\n原始代码:\n'+code;
  }
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  showToast('已复制!');
}
function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
format();
</script>
</body>
</html>
