<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>.NET Command Line Argument Parser Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:40px 20px}
.container{max-width:850px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:12px}
.args-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.arg-row{display:flex;gap:8px;align-items:center}
.arg-row input, .arg-row select{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:7px 10px;color:#c9d1d9;font-size:12px;outline:none;font-family:'SF Mono',Monaco,monospace}
.arg-row input:focus,.arg-row select:focus{border-color:#58a6ff}
.arg-row .rm{background:#3d1a1a;border:1px solid #da3633;color:#f85149;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:7px 10px;border-radius:6px;font-size:12px;outline:none}
pre{background:#0d1117;border:1px solid #3fb950;border-radius:6px;padding:16px;font-size:12px;overflow:auto;max-height:450px;font-family:'SF Mono',Monaco,monospace;line-height:1.5;white-space:pre}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;margin-top:8px}
.btn:hover{background:#2ea043}
.btn.s{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.s:hover{background:#30363d}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.header-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.header-row span{font-size:11px;color:#484f58;width:80px}
</style>
</head>
<body>
<div class="container">
<h1>⚙️ .NET CLI Argument Parser Generator</h1>
<p class="sub">定义命令行参数 → 自动生成 C# 解析代码（支持 --flag, --name=value, 位置参数）</p>

<div class="box">
<div class="header-row"><span>简写</span><span style="width:120px">全名</span><span>类型</span><span>描述</span><span style="width:60px"></span></div>
<div class="args-list" id="argsList">
<div class="arg-row"><input value="i" style="width:60px" placeholder="-i"><input value="input" style="width:120px" placeholder="--input"><select style="width:90px"><option>string</option><option>int</option><option>bool</option><option>float</option></select><input value="输入文件路径" placeholder="描述" style="flex:1"><button class="rm" onclick="removeArg(this)">✕</button></div>
<div class="arg-row"><input value="o" style="width:60px" placeholder="-o"><input value="output" style="width:120px" placeholder="--output"><select style="width:90px"><option>string</option><option selected>bool</option><option>int</option><option>float</option></select><input value="输出详细日志" style="flex:1"><button class="rm" onclick="removeArg(this)">✕</button></div>
<div class="arg-row"><input value="c" style="width:60px" placeholder="-c"><input value="count" style="width:120px" placeholder="--count"><select style="width:90px"><option>string</option><option selected>int</option><option>bool</option><option>float</option></select><input value="处理数量" style="flex:1"><button class="rm" onclick="removeArg(this)">✕</button></div>
</div>
<button class="btn s" onclick="addArg()">+ 添加参数</button>
<button class="btn" onclick="generate()" style="float:right">⚡ 生成代码</button>
</div>

<div class="box">
<h3>📤 C# 代码</h3>
<pre id="output">点击"生成"按钮...</pre>
<button class="btn s" onclick="copyResult()">📋 复制</button>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
function addArg(){
  let list=document.getElementById('argsList');
  let div=document.createElement('div');div.className='arg-row';
  div.innerHTML='<input style="width:60px" placeholder="-x"><input style="width:120px" placeholder="--name"><select style="width:90px"><option>string</option><option>int</option><option>bool</option><option>float</option></select><input placeholder="描述" style="flex:1"><button class="rm" onclick="removeArg(this)">✕</button>';
  list.appendChild(div);
}
function removeArg(btn){btn.closest('.arg-row').remove();}

function generate(){
  let rows=document.querySelectorAll('.arg-row');
  let args=[];
  rows.forEach(r=>{
    let ins=r.querySelectorAll('input');
    let sel=r.querySelector('select');
    args.push({short:ins[0].value||'',long:ins[1].value||'',type:sel.value,desc:ins[2].value||''});
  });

  let code=`using System;\nusing System.Collections.Generic;\n\npublic class CommandLineArgs\n{\n`;
  args.forEach(a=>{
    let t=a.type==='bool'?'bool':a.type==='int'?'int':a.type==='float'?'double':'string';
    code+=`    public ${t} ${capitalize(a.long)||'Arg'} { get; set; }\n`;
  });
  code+=`\n    public static CommandLineArgs Parse(string[] args)\n    {\n        var result = new CommandLineArgs();\n        var dict = new Dictionary<string, Action<string>>\n        {\n`;
  args.forEach(a=>{
    if(a.long){
      let t=a.type==='bool'?'bool':a.type==='int'?'int':a.type==='float'?'double':'string';
      let handler=a.type==='bool'?`v => result.${capitalize(a.long)}=true`:a.type==='int'?`v => result.${capitalize(a.long)}=int.Parse(v)`:a.type==='float'?`v => result.${capitalize(a.long)}=double.Parse(v)`:`v => result.${capitalize(a.long)}=v`;
      code+=`            ["--${a.long}"] = ${handler},\n`;
      if(a.short)code+=`            ["-${a.short}"] = ${handler},\n`;
    }
  });
  code+=`        };\n\n        for (int i = 0; i < args.Length; i++)\n        {\n            var arg = args[i];\n`;
  code+=`            if (arg.Contains("="))\n            {\n                var parts = arg.Split('=', 2);\n                if (dict.TryGetValue(parts[0], out var act))\n                    act(parts[1]);\n            }\n            else if (dict.TryGetValue(arg, out var act) && `;
  // For bool
  code+=`\n                     i + 1 < args.Length && !args[i + 1].StartsWith("-"))\n            {\n                act(args[++i]);\n            }\n            else if (dict.TryGetValue(arg, out var act2))\n            {\n                act2(null);\n            }\n        }\n\n        return result;\n    }\n\n    public void PrintHelp()\n    {\n        Console.WriteLine("用法: program [选项]");\n`;
  args.forEach(a=>{
    code+=`        Console.WriteLine($"  ${a.short?'-'+a.short+', ':''}--${a.long}: ${a.desc}");\n`;
  });
  code+=`    }\n}\n\n// ===== 使用示例 =====\nclass Program\n{\n    static void Main(string[] args)\n    {\n        var cli = CommandLineArgs.Parse(args);\n        ${args.filter(a=>a.type==='bool').map(a=>`if(cli.${capitalize(a.long)}) Console.WriteLine("${a.desc}");`).join('\n        ')}\n        ${args.filter(a=>a.type!=='bool').map(a=>`Console.WriteLine($"${capitalize(a.long)}: {cli.${capitalize(a.long)}}");`).join('\n        ')}\n    }\n}\n`;
  document.getElementById('output').textContent=code;
}

function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function copyResult(){navigator.clipboard.writeText(document.getElementById('output').textContent);showToast('已复制!');}
function showToast(msg){let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',1500);}
generate();
</script>
</body>
</html>
