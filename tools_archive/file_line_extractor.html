<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>File Line Extractor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:40px 20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
label{font-size:12px;color:#8b949e;display:block;margin-bottom:4px}
input{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 12px;color:#c9d1d9;font-family:'SF Mono',Monaco,monospace;font-size:13px;outline:none}
input:focus{border-color:#58a6ff}
textarea{width:100%;min-height:300px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;color:#c9d1d9;font-family:'SF Mono',Monaco,monospace;font-size:12px;resize:vertical;outline:none;line-height:1.8}
textarea:focus{border-color:#58a6ff}
.output-box{border-color:#3fb950}
.line-num{color:#484f58;user-select:none;margin-right:12px;display:inline-block;width:40px;text-align:right;font-size:11px}
.line-content{white-space:pre}
.line{display:flex;align-items:baseline}
.highlight{background:#1b3825;border-left:3px solid #3fb950;padding-left:6px}
.preview-box{background:#0d1117;border:1px solid #3fb950;border-radius:8px;padding:14px;font-family:'SF Mono',Monaco,monospace;font-size:13px;line-height:1.6;max-height:400px;overflow:auto;white-space:pre-wrap}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px}
.btn:hover{background:#2ea043}
.btn.s{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.s:hover{background:#30363d}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.info{font-size:11px;color:#484f58;margin:4px 0}
.tab-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;margin-right:4px}
.tab-btn.active{background:#1a2537;border-color:#58a6ff;color:#58a6ff}
</style>
</head>
<body>
<div class="container">
<h1>📄 File Line Extractor</h1>
<p class="sub">粘贴文本 → 输入行号范围 → 提取指定行</p>
<div class="row">
<div><label>行号范围:</label><input id="range" value="1,3,5-8,12" placeholder="1,3,5-8,12" style="width:240px"></div>
<div><button class="btn" onclick="extract()">🔍 提取</button> <button class="btn s" onclick="loadSample()">📎 示例</button></div>
</div>
<div style="display:flex;gap:4px;margin-bottom:12px">
<span class="tab-btn active" onclick="switchTab('input')">📥 输入</span>
<span class="tab-btn" onclick="switchTab('output')">📤 提取结果</span>
</div>
<div id="tabInput"><textarea id="input" placeholder="粘贴文本内容...&#10;每一行都会被自动编号&#10;然后在上面输入行号范围来提取"></textarea></div>
<div id="tabOutput" style="display:none"><div class="preview-box" id="output">等待提取...</div>
<button class="btn s" onclick="copyResult()" style="margin-top:8px">📋 复制提取结果</button></div>
</div>
<div class="toast" id="toast"></div>
<script>
let currentTab='input',lastResult='',lastLines=[];
function loadSample(){
  let lines=[];
  for(let i=1;i<=20;i++)lines.push(`${i}: Lorem ipsum dolor sit amet, consectetur adipiscing elit. Line ${i} content here.`);
  document.getElementById('input').value=lines.join('\n');
  updateLineNums();
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tabInput').style.display=tab==='input'?'block':'none';
  document.getElementById('tabOutput').style.display=tab==='output'?'block':'none';
}
function parseRange(r){
  let nums=new Set();
  let parts=r.split(',');
  parts.forEach(p=>{
    p=p.trim();
    if(p.includes('-')){
      let[s,e]=p.split('-').map(n=>parseInt(n));
      for(let i=s;i<=e;i++)nums.add(i);
    }else{
      let n=parseInt(p);
      if(!isNaN(n))nums.add(n);
    }
  });
  return [...nums].sort((a,b)=>a-b);
}
function extract(){
  let text=document.getElementById('input').value;
  let rangeStr=document.getElementById('range').value;
  lastLines=text.split('\n');
  let nums=parseRange(rangeStr);
  let result=[];let found=[];
  nums.forEach(n=>{
    if(n>=1&&n<=lastLines.length){result.push(`${n}: ${lastLines[n-1]}`);found.push(n);}
  });
  lastResult=result.join('\n')||'未找到匹配行';
  document.getElementById('output').textContent=lastResult;
  document.getElementById('range').value=found.join(',');
  showToast(`提取了 ${found.length} 行`);
  switchTab('output');
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  document.querySelectorAll('.tab-btn')[0].classList.remove('active');
}
function copyResult(){
  navigator.clipboard.writeText(lastResult);
  showToast('已复制!');
}
function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
loadSample();
</script>
</body>
</html>
