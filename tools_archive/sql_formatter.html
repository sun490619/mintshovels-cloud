<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SQL Formatter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:40px 20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.panels{grid-template-columns:1fr}}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:10px}
textarea{width:100%;min-height:250px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:14px;color:#c9d1d9;font-family:'SF Mono',Monaco,monospace;font-size:12px;resize:vertical;outline:none;line-height:1.6}
textarea:focus{border-color:#58a6ff}
pre{background:#0d1117;border:1px solid #3fb950;border-radius:6px;padding:14px;font-size:12px;overflow:auto;max-height:400px;font-family:'SF Mono',Monaco,monospace;line-height:1.5;white-space:pre}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;margin-top:8px}
.btn:hover{background:#2ea043}
.btn.s{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.s:hover{background:#30363d}
.kw{color:#ff7b72}.func{color:#d2a8ff}.str{color:#a5d6ff}.num{color:#79c0ff}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>📐 SQL Formatter & Refactor</h1>
<p class="sub">粘贴混乱 SQL → 一键格式化 · 关键字大写 · 子句对齐 · 缩进</p>

<div class="panels">
<div class="box">
<h3>📥 原始 SQL</h3>
<textarea id="input">select u.name,u.email,o.total from users u left join orders o on u.id=o.user_id where u.active=1 and o.created_at>'2024-01-01' group by u.name,u.email having sum(o.total)>100 order by o.total desc limit 10</textarea>
<button class="btn" onclick="format()">⚡ 格式化</button>
<button class="btn s" onclick="sample2()">📎 复杂示例</button>
</div>
<div class="box">
<h3>📤 格式化结果</h3>
<pre id="output">等待格式化...</pre>
<button class="btn s" onclick="copyResult()">📋 复制</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const KW=['SELECT','FROM','WHERE','AND','OR','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN',
'ON','GROUP BY','HAVING','ORDER BY','LIMIT','OFFSET','INSERT INTO','VALUES','UPDATE','SET',
'DELETE','CREATE TABLE','ALTER TABLE','DROP TABLE','UNION','UNION ALL','AS','IN','NOT IN',
'BETWEEN','LIKE','IS NULL','IS NOT NULL','EXISTS','CASE','WHEN','THEN','ELSE','END',
'DISTINCT','COUNT','SUM','AVG','MAX','MIN','ASC','DESC','NULLS FIRST','NULLS LAST',
'WITH','RECURSIVE','CROSS JOIN','NATURAL JOIN','USING','ON CONFLICT','RETURNING',
'OVER','PARTITION BY','ROWS','RANGE','PRECEDING','FOLLOWING','UNBOUNDED','CURRENT ROW'];

function formatSQL(sql){
  sql=sql.replace(/\s+/g,' ').trim();
  let upper=new Set(KW.map(k=>k.toUpperCase()));
  let tokens=sql.split(/(\s+)/);
  let formatted='';
  let indent=0;
  let i=0;
  let needSpace=false; // true when next token needs a leading space

  function push(s){
    if(formatted && needSpace && s && !s.startsWith(',') && !s.startsWith(')') && s!=='\n' 
       && !formatted.endsWith('\n') && !formatted.endsWith('(')){
      formatted+=' ';
    }
    needSpace=false;
    formatted+=s;
  }

  function newline(ind){
    formatted=formatted.trimEnd();
    formatted+='\n'+'  '.repeat(ind);
    needSpace=false;
  }

  while(i<tokens.length){
    let token=tokens[i];
    if(token.trim()===''){i++;continue}
    let word=token.trim().toUpperCase();

    // Check multi-word keywords (skip whitespace tokens between parts)
    let multiMatch=null;
    for(let kw of KW){
      if(kw.includes(' ')){
        let parts=kw.split(' ');
        let matched=true;
        let ti=i;
        for(let j=0;j<parts.length;j++){
          while(ti<tokens.length&&tokens[ti].trim()==='')ti++;
          if(ti>=tokens.length||tokens[ti].trim().toUpperCase()!==parts[j]){
            matched=false;break;
          }
          ti++;
        }
        if(matched){multiMatch=kw;break;}
      }
    }

    if(multiMatch){
      let major=['SELECT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT',
                 'INSERT INTO','UPDATE','DELETE','CREATE TABLE','ALTER TABLE',
                 'LEFT JOIN','RIGHT JOIN','INNER JOIN','JOIN','ON','SET','VALUES',
                 'UNION','UNION ALL','WITH'];
      if(major.includes(multiMatch)){
        if(multiMatch==='ON'||multiMatch==='SET'||multiMatch==='VALUES')indent=1;
        else if(multiMatch==='UNION'||multiMatch==='UNION ALL')indent=0;
        else indent=0;
        newline(indent);
        push(multiMatch);
        if(multiMatch.includes('JOIN'))indent=1;
      }else{
        push('\n'+'  '.repeat(indent)+multiMatch);
      }
      // Advance i past all parts of the multi-word keyword (skip whitespace between)
      let matchParts=multiMatch.split(' ').length;
      let advanced=0;
      while(advanced<matchParts && i<tokens.length){
        if(tokens[i].trim()===''){i++;continue}
        i++;
        advanced++;
      }
      // skip remaining whitespace tokens after keyword
      while(i<tokens.length&&tokens[i].trim()==='')i++;
      needSpace=true;
      continue;
    }

    // Single keyword
    if(upper.has(word)){
      if(word==='AND'||word==='OR'){
        newline(indent+1);
        push(word);
      }else if(word==='AS'){
        push(word);
      }else{
        if(word==='FROM')indent=1;
        newline(indent);
        push(word);
      }
      i++;
      while(i<tokens.length&&tokens[i].trim()==='')i++;
      needSpace=true;
      continue;
    }

    // Comma
    if(token.trim()===','){
      push(',');
      newline(indent+1);
      i++;
      continue;
    }

    // Parentheses
    if(token.trim()==='('){
      push('(');
      i++;
      needSpace=false;
      continue;
    }
    if(token.trim()===')'){
      push(')');
      i++;
      needSpace=true;
      continue;
    }

    // Semicolon
    if(token.trim()===';'){
      push(';');
      newline(indent);
      i++;
      continue;
    }

    push(token);
    i++;
    needSpace=true;
  }

  return formatted.trim();
}

function format(){
  let input=document.getElementById('input').value;
  try{
    let result=formatSQL(input);
    document.getElementById('output').textContent=result;
    showToast('格式化完成!');
  }catch(e){
    document.getElementById('output').textContent='格式化错误: '+e.message;
  }
}

function sample2(){
  document.getElementById('input').value=`with monthly_sales as (select p.category,p.name,sum(o.quantity*o.unit_price) as revenue from products p inner join order_items o on p.id=o.product_id inner join orders ord on o.order_id=ord.id where ord.status='completed' and ord.created_at between '2024-01-01' and '2024-12-31' group by p.category,p.name) select category,name,revenue,rank() over (partition by category order by revenue desc) as rank from monthly_sales where revenue>1000 order by category,rank`;
  format();
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  showToast('已复制!');
}
function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
format();
</script>
</body>
</html>
