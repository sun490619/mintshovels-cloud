<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - 编辑器 | MintShovels</title>
    <meta name="description" content="Online text editor with auto-save, word count, and character statistics. Free, no signup required.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 24px; }
        .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(99,102,241,0.3); }
        .btn-secondary { background:#27272a; color:#d4d4d8; border:1px solid #3f3f46; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-secondary:hover { background:#3f3f46; }
        input, textarea { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:10px 14px; color:#fafafa; font-size:14px; width:100%; }
        input:focus, textarea:focus { outline:none; border-color:#6366f1; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto">
        <a href="../index.html" class="text-zinc-500 hover:text-white text-sm mb-6 inline-block">← MintShovels</a>
        <div class="card mb-6">
            <div class="text-5xl mb-4">💼</div>
            <h1 class="text-2xl font-bold">Editor</h1>
            <p class="text-zinc-400">编辑器</p>
            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                Shovel #027 · 🔧 Web Tool
            </span>
        </div>
        <div class="card">
            <textarea id="editor" class="h-64" placeholder="开始输入..."></textarea>
            <div class="flex items-center gap-3 mt-4 flex-wrap">
                <button class="btn-primary" onclick="saveDoc()">💾 保存</button>
                <button class="btn-secondary" onclick="loadDoc()">📂 加载</button>
                <button class="btn-secondary" onclick="clearDoc()">🗑 清空</button>
                <span id="status" class="text-xs text-zinc-500 ml-auto"></span>
            </div>
        </div>
        <div class="card mt-4">
            <h3 class="text-sm font-semibold text-zinc-300 mb-2">📊 统计</h3>
            <div id="stats" class="text-xs text-zinc-500 grid grid-cols-4 gap-2"></div>
        </div>
        <script>
            const textarea = document.getElementById('editor');
            const status = document.getElementById('status');
            const stats = document.getElementById('stats');
            const STORAGE_KEY = 'mintshovels_editor';

            textarea.addEventListener('input', updateStats);

            function saveDoc() {
                const text = textarea.value;
                localStorage.setItem(STORAGE_KEY, text);
                status.textContent = `✅ 已保存 (${text.length} 字符)`;
                status.className = 'text-xs text-emerald-400 ml-auto';
            }

            function loadDoc() {
                const text = localStorage.getItem(STORAGE_KEY) || '';
                textarea.value = text;
                if (text) {
                    status.textContent = `📂 已加载 (${text.length} 字符)`;
                } else {
                    status.textContent = 'ℹ️ 没有保存的文档';
                }
                status.className = 'text-xs text-zinc-500 ml-auto';
                updateStats();
            }

            function clearDoc() {
                if (textarea.value && !confirm('确认清空？')) return;
                textarea.value = '';
                localStorage.removeItem(STORAGE_KEY);
                status.textContent = '🗑 已清空';
                status.className = 'text-xs text-zinc-500 ml-auto';
                updateStats();
            }

            function updateStats() {
                const text = textarea.value;
                const chars = text.length;
                const words = text.trim() ? text.trim().split(/\s+/).length : 0;
                const lines = text ? text.split('\n').length : 0;
                const bytes = new TextEncoder().encode(text).length;
                stats.innerHTML = `<span>字符: ${chars}</span><span>单词: ${words}</span><span>行: ${lines}</span><span>大小: ${(bytes/1024).toFixed(1)}KB</span>`;
            }

            // 自动加载上次内容
            loadDoc();
        </script>
    </div>
</body>
</html>
