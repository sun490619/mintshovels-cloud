<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>String to f-string Converter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;padding:40px 20px}
.container{max-width:800px;width:100%}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:10px}
textarea{width:100%;min-height:150px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;color:#c9d1d9;font-family:'SF Mono',Monaco,monospace;font-size:13px;resize:vertical;outline:none}
textarea:focus{border-color:#58a6ff}
.btn{background:#238636;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;margin-top:12px}
.btn:hover{background:#2ea043}
.btn.copy{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.copy:hover{background:#30363d}
.result-box{background:#0d1117;border:1px solid#30363d;border-radius:6px;padding:14px;font-family:'SF Mono',Monaco,monospace;font-size:13px;white-space:pre-wrap;min-height:80px;max-height:400px;overflow:auto}
.diff-line{display:flex;margin:2px 0;font-size:12px}
.diff-line .old{color:#f85149;text-decoration:line-through;margin-right:8px;min-width:200px}
.diff-line .new{color:#3fb950}
.arrow{color:#8b949e;margin-right:8px}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>🔄 String to f-string Converter</h1>
<p class="sub">把旧式 Python 字符串格式化 (% / .format()) 自动转为 f-string 语法</p>

<div class="box">
<h3>📥 输入 Python 代码</h3>
<textarea id="input" placeholder="粘贴包含 % 或 .format() 的 Python 代码...&#10;&#10;例如：&#10;name = 'World'&#10;print('Hello, %s!' % name)&#10;print('Hello, {}!'.format(name))"></textarea>
<button class="btn" onclick="convert()">⚡ 转换</button>
<button class="btn copy" onclick="copyResult()">📋 复制结果</button>
</div>

<div class="box">
<h3>📤 转换结果 (f-string)</h3>
<div class="result-box" id="output">等待转换...</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
function convert(){
  let code=document.getElementById('input').value;
  if(!code.trim()){document.getElementById('output').textContent='请先输入代码';return}

  // Replace %s, %d, %f, %r patterns
  code=code.replace(/'([^']*)'\s*%\s*\(([^)]+)\)/g,(m,str,args)=>{
    let parts=str.split(/%[sdferx]/);
    let argList=args.split(',').map(a=>a.trim());
    let result='f"'+parts[0];
    for(let i=1;i<parts.length;i++){
      result+='{'+argList[i-1]+'}'+parts[i];
    }
    return result+'"';
  });

  // Replace '...' % (single_var)
  code=code.replace(/'([^']*)'\s*%\s+([a-zA-Z_]\w*)/g,(m,str,varName)=>{
    return 'f"'+str.replace(/%[sdferx]/,'{'+varName+'}')+'"';
  });

  // Replace .format(**kwargs) or .format(kwargs)
  code=code.replace(/['"]([^'"]*)['"]\s*\.format\(\s*\*\*(\w+)\s*\)/g,(m,str,varName)=>{
    return 'f"'+str.replace(/\{(\w+)\}/g,(m2,k)=>{return '{'+varName+'[\"'+k+'\"]}'})+'"';
  });

  // Replace .format(pos_args)
  code=code.replace(/['"]([^'"]*)['"]\s*\.format\(([^)]+)\)/g,(m,str,args)=>{
    let argList=args.split(',').map(a=>a.trim());
    return 'f"'+str.replace(/\{\}/g,()=>'{'+argList.shift()+'}'+'"');
  });

  document.getElementById('output').textContent=code;
  showToast('转换完成!');
}

function copyResult(){
  let text=document.getElementById('output').textContent;
  navigator.clipboard.writeText(text);
  showToast('已复制!');
}

function showToast(msg){
  let t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
</script>
</body>
</html>
