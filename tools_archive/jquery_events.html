<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>jQuery Event Reference</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:40px 20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 16px;color:#c9d1d9;font-size:14px;outline:none}
.search-box input:focus{border-color:#58a6ff}
.categories{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.cat-badge{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;background:#21262d;border:1px solid #30363d;color:#8b949e;transition:all .15s}
.cat-badge:hover,.cat-badge.active{background:#1a2537;border-color:#58a6ff;color:#58a6ff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#21262d;padding:10px 14px;text-align:left;font-weight:600;color:#8b949e;font-size:12px;border-bottom:2px solid #30363d;position:sticky;top:0}
td{padding:9px 14px;border-bottom:1px solid #21262d}
tr:hover td{background:#1c2128}
td.code{font-family:'SF Mono',Monaco,monospace;color:#ff7b72;font-size:13px}
td.desc{color:#c9d1d9;font-size:12px}
td.cat{font-size:11px}
.cat-mouse{color:#58a6ff}.cat-key{color:#3fb950}.cat-form{color:#d29922}.cat-window{color:#bc8cff}.cat-doc{color:#f778ba}
.count{font-size:12px;color:#484f58;float:right}
</style>
</head>
<body>
<div class="container">
<h1>📚 jQuery Event Types — 完整参考</h1>
<p class="sub">搜索/筛选 jQuery 所有事件类型（45个） · 按分类浏览</p>
<div class="search-box"><input placeholder="🔍 搜索事件名..." id="search" oninput="filter()"></div>
<div class="categories" id="cats">
<span class="cat-badge active" onclick="setCat('all')">全部</span>
<span class="cat-badge" onclick="setCat('mouse')">🖱️ 鼠标</span>
<span class="cat-badge" onclick="setCat('keyboard')">⌨️ 键盘</span>
<span class="cat-badge" onclick="setCat('form')">📝 表单</span>
<span class="cat-badge" onclick="setCat('window')">🪟 窗口</span>
<span class="cat-badge" onclick="setCat('document')">📄 文档</span>
</div>
<div style="overflow-x:auto;max-height:70vh;overflow-y:auto">
<table><thead><tr><th>事件名</th><th>说明</th><th>分类</th></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="count" style="margin-top:8px" id="count">--</div>
</div>

<script>
const events = [
  {name:'click',desc:'点击元素时触发',cat:'mouse'},{name:'dblclick',desc:'双击元素时触发',cat:'mouse'},
  {name:'mousedown',desc:'鼠标按下时触发',cat:'mouse'},{name:'mouseup',desc:'鼠标松开时触发',cat:'mouse'},
  {name:'mousemove',desc:'鼠标移动时触发',cat:'mouse'},{name:'mouseenter',desc:'鼠标进入元素时触发（不冒泡）',cat:'mouse'},
  {name:'mouseleave',desc:'鼠标离开元素时触发（不冒泡）',cat:'mouse'},{name:'mouseover',desc:'鼠标进入元素或子元素时触发',cat:'mouse'},
  {name:'mouseout',desc:'鼠标离开元素或子元素时触发',cat:'mouse'},{name:'contextmenu',desc:'右键菜单时触发',cat:'mouse'},
  {name:'hover',desc:'mouseenter + mouseleave 组合',cat:'mouse'},{name:'keydown',desc:'键盘按键按下时触发',cat:'keyboard'},
  {name:'keyup',desc:'键盘按键松开时触发',cat:'keyboard'},{name:'keypress',desc:'键盘按键按下（字符键）时触发(已废弃)',cat:'keyboard'},
  {name:'submit',desc:'表单提交时触发',cat:'form'},{name:'change',desc:'表单元素值改变时触发',cat:'form'},
  {name:'focus',desc:'元素获得焦点时触发（不冒泡）',cat:'form'},{name:'blur',desc:'元素失去焦点时触发（不冒泡）',cat:'form'},
  {name:'focusin',desc:'元素或其子元素获得焦点时触发',cat:'form'},{name:'focusout',desc:'元素或其子元素失去焦点时触发',cat:'form'},
  {name:'select',desc:'选中文本时触发',cat:'form'},{name:'input',desc:'输入框内容变化时触发',cat:'form'},
  {name:'load',desc:'元素加载完成时触发',cat:'window'},{name:'unload',desc:'页面卸载时触发(已废弃)',cat:'window'},
  {name:'resize',desc:'窗口大小改变时触发',cat:'window'},{name:'scroll',desc:'元素滚动时触发',cat:'window'},
  {name:'error',desc:'加载错误时触发',cat:'window'},{name:'ready',desc:'DOM 加载完成时触发',cat:'document'},
  {name:'dragstart',desc:'开始拖拽时触发',cat:'mouse'},{name:'dragend',desc:'拖拽结束时触发',cat:'mouse'},
  {name:'dragover',desc:'拖拽悬停时触发',cat:'mouse'},{name:'drop',desc:'释放拖拽元素时触发',cat:'mouse'},
  {name:'touchstart',desc:'触摸开始时触发',cat:'mouse'},{name:'touchend',desc:'触摸结束时触发',cat:'mouse'},
  {name:'touchmove',desc:'触摸移动时触发',cat:'mouse'},{name:'wheel',desc:'鼠标滚轮滚动时触发',cat:'mouse'},
  {name:'animationend',desc:'CSS 动画结束时触发',cat:'window'},{name:'transitionend',desc:'CSS 过渡结束时触发',cat:'window'},
  {name:'online',desc:'浏览器恢复网络时触发',cat:'window'},{name:'offline',desc:'浏览器失去网络时触发',cat:'window'},
  {name:'hashchange',desc:'URL hash 改变时触发',cat:'window'},{name:'beforeunload',desc:'页面即将卸载时触发',cat:'window'},
  {name:'copy',desc:'复制操作时触发',cat:'document'},{name:'cut',desc:'剪切操作时触发',cat:'document'},
  {name:'paste',desc:'粘贴操作时触发',cat:'document'},
];

let currentCat='all';

function render(items){
  let html='';
  items.forEach(e=>{
    html+=`<tr><td class="code">.on("${e.name}")</td><td class="desc">${e.desc}</td><td class="cat cat-${e.cat}">${e.cat}</td></tr>`;
  });
  document.getElementById('tbody').innerHTML=html;
  document.getElementById('count').textContent=`共 ${items.length} 个事件`;
}

function filter(){
  let q=document.getElementById('search').value.toLowerCase();
  let filtered=events.filter(e=>{
    if(currentCat!=='all'&&e.cat!==currentCat)return false;
    if(q&&!e.name.includes(q)&&!e.desc.toLowerCase().includes(q))return false;
    return true;
  });
  render(filtered);
}

function setCat(cat){
  currentCat=cat;
  document.querySelectorAll('.cat-badge').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  filter();
}

render(events);
document.getElementById('count').textContent=`共 ${events.length} 个事件`;
</script>
</body>
</html>
