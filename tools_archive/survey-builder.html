<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Builder - 问卷构建器 | MintShovels</title>
    <meta name="description" content="Build beautiful surveys and questionnaires with drag-and-drop. Multiple question types, logic branching, and real-time preview. Free online tool.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 24px; }
        .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(99,102,241,0.3); }
        .btn-primary-sm { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:6px 14px; border-radius:8px; font-weight:600; font-size:12px; cursor:pointer; }
        .btn-primary-sm:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(99,102,241,0.3); }
        .btn-secondary { background:#27272a; color:#d4d4d8; border:1px solid #3f3f46; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-secondary:hover { background:#3f3f46; }
        .btn-danger-sm { background:#7f1d1d; color:#fca5a5; border:1px solid #991b1b; padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; }
        .btn-danger-sm:hover { background:#991b1b; }
        input, textarea, select { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:10px 14px; color:#fafafa; font-size:14px; width:100%; }
        input:focus, textarea:focus, select:focus { outline:none; border-color:#6366f1; }
        .question-card { background:#1a1a2e; border:1px solid #2d2d44; border-radius:12px; padding:16px; margin-bottom:12px; cursor:move; }
        .question-card:hover { border-color:#6366f1; }
        .option-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .option-row input { flex:1; }
        .drag-handle { color:#52525b; cursor:grab; font-size:18px; }
        .drag-handle:active { cursor:grabbing; }
        .question-type-badge { font-size:10px; padding:2px 8px; border-radius:999px; background:#2d2d44; color:#a1a1aa; }
        .preview-survey { background:#09090b; border:1px solid #27272a; border-radius:12px; padding:20px; }
        .preview-survey .preview-question { margin-bottom:20px; }
        .preview-survey .preview-question label { display:block; margin-bottom:8px; font-weight:500; }
        .preview-survey .preview-question input[type="text"],
        .preview-survey .preview-question textarea,
        .preview-survey .preview-question select { background:#18181b; }
        .preview-survey .preview-question input[type="radio"],
        .preview-survey .preview-question input[type="checkbox"] { width:auto; margin-right:6px; accent-color:#6366f1; }
        .preview-survey .preview-question label.option-label { font-weight:400; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .tab-btn { padding:8px 20px; border-radius:8px 8px 0 0; font-size:13px; font-weight:500; cursor:pointer; border:none; background:#18181b; color:#71717a; }
        .tab-btn.active { background:#27272a; color:#fafafa; border-bottom:2px solid #6366f1; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:#09090b; }
        ::-webkit-scrollbar-thumb { background:#3f3f46; border-radius:3px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <a href="../index.html" class="text-zinc-500 hover:text-white text-sm mb-6 inline-block">← MintShovels</a>
        <div class="card mb-6">
            <div class="text-5xl mb-4">📋</div>
            <h1 class="text-2xl font-bold">Survey Builder</h1>
            <p class="text-zinc-400">问卷构建器 — 拖拽排序 · 多题型 · 实时预览</p>
            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                Shovel #036 · 🔧 Web Tool
            </span>
        </div>

        <div class="flex gap-2 mb-4">
            <button class="tab-btn active" onclick="switchTab('builder')">🛠 构建</button>
            <button class="tab-btn" onclick="switchTab('preview')">👁 预览</button>
            <button class="tab-btn" onclick="switchTab('export')">📤 导出</button>
        </div>

        <!-- Builder Tab -->
        <div id="tab-builder" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <!-- Question Palette -->
                <div class="card">
                    <h3 class="text-sm font-semibold text-zinc-300 mb-3">➕ 添加题目</h3>
                    <div class="space-y-2">
                        <button onclick="addQuestion('text')" class="w-full text-left btn-secondary text-sm py-2">📝 文本输入</button>
                        <button onclick="addQuestion('textarea')" class="w-full text-left btn-secondary text-sm py-2">📄 多行文本</button>
                        <button onclick="addQuestion('radio')" class="w-full text-left btn-secondary text-sm py-2">🔘 单选</button>
                        <button onclick="addQuestion('checkbox')" class="w-full text-left btn-secondary text-sm py-2">☑️ 多选</button>
                        <button onclick="addQuestion('select')" class="w-full text-left btn-secondary text-sm py-2">📋 下拉选择</button>
                        <button onclick="addQuestion('rating')" class="w-full text-left btn-secondary text-sm py-2">⭐ 评分</button>
                        <button onclick="addQuestion('email')" class="w-full text-left btn-secondary text-sm py-2">📧 邮箱</button>
                        <button onclick="addQuestion('number')" class="w-full text-left btn-secondary text-sm py-2">🔢 数字</button>
                    </div>
                </div>

                <!-- Question List -->
                <div class="lg:col-span-2 card">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-sm font-semibold text-zinc-300">📝 问卷题目 <span id="qCount" class="text-zinc-500">(0)</span></h3>
                        <div class="flex gap-2">
                            <input id="surveyTitle" value="我的问卷" class="w-40 text-sm" placeholder="问卷标题">
                            <button onclick="clearAll()" class="btn-danger-sm">🗑 清空</button>
                        </div>
                    </div>
                    <div id="questionList" class="min-h-[200px]">
                        <div class="text-zinc-600 text-sm text-center py-12">点击左侧添加题目</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preview Tab -->
        <div id="tab-preview" class="tab-content">
            <div class="card">
                <h3 class="text-sm font-semibold text-zinc-300 mb-4">👁 问卷预览</h3>
                <div id="previewContent" class="preview-survey">
                    <p class="text-zinc-500 text-sm">请先在「构建」标签页添加题目</p>
                </div>
            </div>
        </div>

        <!-- Export Tab -->
        <div id="tab-export" class="tab-content">
            <div class="card">
                <h3 class="text-sm font-semibold text-zinc-300 mb-3">📤 导出问卷</h3>
                <div class="space-y-3">
                    <button onclick="exportJSON()" class="btn-primary-sm">📄 导出 JSON</button>
                    <button onclick="exportHTML()" class="btn-primary-sm ml-2">🌐 导出 HTML 表单</button>
                    <button onclick="copyToClipboard()" class="btn-primary-sm ml-2">📋 复制 JSON</button>
                    <div id="exportOutput" class="mt-3">
                        <textarea id="exportTextarea" rows="10" class="font-mono text-xs" readonly placeholder="导出内容将显示在这里..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let qIdCounter = 0;

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
            document.getElementById(`tab-${name}`).classList.add('active');
            if (name === 'preview') renderPreview();
            if (name === 'export') renderExport();
        }

        function addQuestion(type) {
            qIdCounter++;
            const id = `q_${qIdCounter}`;
            const q = { id, type, title: getDefaultTitle(type), required: false, options: ['选项 1', '选项 2'] };
            if (type === 'rating') q.maxRating = 5;
            questions.push(q);
            renderQuestions();
        }

        function getDefaultTitle(type) {
            const map = {
                text: '请输入文本',
                textarea: '请详细描述',
                radio: '请选择一项',
                checkbox: '请选择（可多选）',
                select: '请选择一个选项',
                rating: '请评分',
                email: '请输入邮箱',
                number: '请输入数字'
            };
            return map[type] || '新问题';
        }

        function renderQuestions() {
            const container = document.getElementById('questionList');
            document.getElementById('qCount').textContent = `(${questions.length})`;
            if (questions.length === 0) {
                container.innerHTML = '<div class="text-zinc-600 text-sm text-center py-12">点击左侧添加题目</div>';
                return;
            }
            container.innerHTML = questions.map((q, idx) => `
                <div class="question-card" data-id="${q.id}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span class="drag-handle">⠿</span>
                            <span class="text-xs text-zinc-500">#${idx + 1}</span>
                            <span class="question-type-badge">${getTypeLabel(q.type)}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="flex items-center gap-1 text-xs text-zinc-500">
                                <input type="checkbox" ${q.required ? 'checked' : ''} onchange="toggleRequired('${q.id}')" style="width:auto;accent-color:#6366f1;">
                                必填
                            </label>
                            <button onclick="moveQuestion('${q.id}', -1)" class="text-zinc-600 hover:text-white text-xs" ${idx === 0 ? 'disabled' : ''}>↑</button>
                            <button onclick="moveQuestion('${q.id}', 1)" class="text-zinc-600 hover:text-white text-xs" ${idx === questions.length - 1 ? 'disabled' : ''}>↓</button>
                            <button onclick="deleteQuestion('${q.id}')" class="btn-danger-sm">✕</button>
                        </div>
                    </div>
                    <input type="text" value="${escapeHtml(q.title)}" onchange="updateTitle('${q.id}', this.value)" class="text-sm font-medium mb-2" placeholder="问题标题">
                    ${renderQuestionOptions(q)}
                </div>
            `).join('');
        }

        function renderQuestionOptions(q) {
            if (['radio', 'checkbox', 'select'].includes(q.type)) {
                return `
                    <div class="mt-2 space-y-1">
                        ${q.options.map((opt, i) => `
                            <div class="option-row">
                                <span class="text-zinc-600">${q.type === 'radio' ? '◉' : q.type === 'checkbox' ? '☐' : '▾'}</span>
                                <input type="text" value="${escapeHtml(opt)}" onchange="updateOption('${q.id}', ${i}, this.value)" class="text-sm" placeholder="选项 ${i + 1}">
                                <button onclick="removeOption('${q.id}', ${i})" class="text-red-500 hover:text-red-400 text-xs">✕</button>
                            </div>
                        `).join('')}
                        <button onclick="addOption('${q.id}')" class="text-indigo-400 hover:text-indigo-300 text-xs mt-1">+ 添加选项</button>
                    </div>
                `;
            }
            if (q.type === 'rating') {
                return `
                    <div class="mt-2 flex items-center gap-2 text-xs text-zinc-400">
                        <span>最高评分:</span>
                        <select onchange="updateRating('${q.id}', this.value)" style="width:auto;padding:4px 8px;font-size:12px;">
                            ${[3,5,10].map(n => `<option value="${n}" ${q.maxRating === n ? 'selected' : ''}>${n} 星</option>`).join('')}
                        </select>
                    </div>
                `;
            }
            if (q.type === 'email') {
                return `<div class="mt-1 text-xs text-zinc-600">📧 自动验证邮箱格式</div>`;
            }
            if (q.type === 'number') {
                return `<div class="mt-1 text-xs text-zinc-600">🔢 仅允许数字输入</div>`;
            }
            return '';
        }

        function updateTitle(id, val) {
            const q = questions.find(x => x.id === id);
            if (q) q.title = val;
        }

        function updateOption(id, idx, val) {
            const q = questions.find(x => x.id === id);
            if (q) q.options[idx] = val;
        }

        function addOption(id) {
            const q = questions.find(x => x.id === id);
            if (q) { q.options.push(`选项 ${q.options.length + 1}`); renderQuestions(); }
        }

        function removeOption(id, idx) {
            const q = questions.find(x => x.id === id);
            if (q && q.options.length > 2) { q.options.splice(idx, 1); renderQuestions(); }
        }

        function toggleRequired(id) {
            const q = questions.find(x => x.id === id);
            if (q) q.required = !q.required;
        }

        function moveQuestion(id, dir) {
            const idx = questions.findIndex(x => x.id === id);
            if (idx === -1) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= questions.length) return;
            [questions[idx], questions[newIdx]] = [questions[newIdx], questions[idx]];
            renderQuestions();
        }

        function deleteQuestion(id) {
            questions = questions.filter(x => x.id !== id);
            renderQuestions();
        }

        function clearAll() {
            if (questions.length === 0) return;
            if (!confirm('确定清空所有题目？')) return;
            questions = [];
            renderQuestions();
        }

        function updateRating(id, val) {
            const q = questions.find(x => x.id === id);
            if (q) q.maxRating = parseInt(val);
        }

        function renderPreview() {
            const container = document.getElementById('previewContent');
            const title = document.getElementById('surveyTitle').value || '我的问卷';
            if (questions.length === 0) {
                container.innerHTML = '<p class="text-zinc-500 text-sm">请先在「构建」标签页添加题目</p>';
                return;
            }
            let html = `<h2 class="text-lg font-bold mb-6">${escapeHtml(title)}</h2>`;
            questions.forEach((q, idx) => {
                html += `<div class="preview-question">`;
                html += `<label>${idx + 1}. ${escapeHtml(q.title)} ${q.required ? '<span class="text-red-400">*</span>' : ''}</label>`;
                switch(q.type) {
                    case 'text':
                        html += `<input type="text" placeholder="请输入..." ${q.required ? 'required' : ''}>`;
                        break;
                    case 'textarea':
                        html += `<textarea rows="3" placeholder="请详细描述..." ${q.required ? 'required' : ''}></textarea>`;
                        break;
                    case 'radio':
                        q.options.forEach(o => {
                            html += `<label class="option-label"><input type="radio" name="preview_${q.id}" ${q.required ? 'required' : ''}> ${escapeHtml(o)}</label><br>`;
                        });
                        break;
                    case 'checkbox':
                        q.options.forEach(o => {
                            html += `<label class="option-label"><input type="checkbox" name="preview_${q.id}"> ${escapeHtml(o)}</label><br>`;
                        });
                        break;
                    case 'select':
                        html += `<select ${q.required ? 'required' : ''}><option value="">-- 请选择 --</option>`;
                        q.options.forEach(o => { html += `<option>${escapeHtml(o)}</option>`; });
                        html += `</select>`;
                        break;
                    case 'rating':
                        for (let i = 1; i <= q.maxRating; i++) {
                            html += `<label class="option-label inline-block mr-1"><input type="radio" name="preview_${q.id}"> ${i}</label>`;
                        }
                        break;
                    case 'email':
                        html += `<input type="email" placeholder="name@example.com" ${q.required ? 'required' : ''}>`;
                        break;
                    case 'number':
                        html += `<input type="number" placeholder="0" ${q.required ? 'required' : ''}>`;
                        break;
                }
                html += `</div>`;
            });
            html += `<button class="btn-primary mt-4" onclick="alert('预览模式 — 提交功能仅在导出后生效')">📨 提交</button>`;
            container.innerHTML = html;
        }

        function renderExport() {
            const data = getSurveyData();
            document.getElementById('exportTextarea').value = JSON.stringify(data, null, 2);
        }

        function getSurveyData() {
            return {
                title: document.getElementById('surveyTitle').value || '我的问卷',
                questions: questions.map((q, idx) => ({
                    id: idx + 1,
                    type: q.type,
                    title: q.title,
                    required: q.required || false,
                    options: ['radio','checkbox','select'].includes(q.type) ? q.options : undefined,
                    maxRating: q.type === 'rating' ? q.maxRating : undefined
                }))
            };
        }

        function exportJSON() {
            const data = getSurveyData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'survey.json';
            a.click();
        }

        function exportHTML() {
            const data = getSurveyData();
            const title = data.title;
            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title><style>body{font-family:system-ui,sans-serif;max-width:640px;margin:40px auto;padding:0 20px}label{display:block;margin-bottom:4px;font-weight:500}.q{margin-bottom:24px}input,textarea,select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px}input[type="radio"],input[type="checkbox"]{width:auto}.required{color:#e53e3e}button{background:#6366f1;color:white;border:none;padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer}</style></head><body>`;
            html += `<h1>${escapeHtml(title)}</h1><form>`;
            data.questions.forEach((q, idx) => {
                html += `<div class="q"><label>${idx + 1}. ${escapeHtml(q.title)}${q.required ? ' <span class="required">*</span>' : ''}</label>`;
                switch(q.type) {
                    case 'text': html += `<input type="text"${q.required ? ' required' : ''}>`; break;
                    case 'textarea': html += `<textarea rows="3"${q.required ? ' required' : ''}></textarea>`; break;
                    case 'radio': q.options.forEach(o => { html += `<label><input type="radio" name="q${q.id}"${q.required ? ' required' : ''}> ${escapeHtml(o)}</label><br>`; }); break;
                    case 'checkbox': q.options.forEach(o => { html += `<label><input type="checkbox" name="q${q.id}"> ${escapeHtml(o)}</label><br>`; }); break;
                    case 'select':
                        html += `<select${q.required ? ' required' : ''}><option>-- 请选择 --</option>`;
                        q.options.forEach(o => { html += `<option>${escapeHtml(o)}</option>`; });
                        html += `</select>`;
                        break;
                    case 'rating':
                        for (let i = 1; i <= (q.maxRating || 5); i++) {
                            html += `<label><input type="radio" name="q${q.id}"${q.required ? ' required' : ''}> ${i}</label> `;
                        }
                        break;
                    case 'email': html += `<input type="email"${q.required ? ' required' : ''}>`; break;
                    case 'number': html += `<input type="number"${q.required ? ' required' : ''}>`; break;
                }
                html += `</div>`;
            });
            html += `<button type="submit">📨 提交</button></form></body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'survey.html';
            a.click();
        }

        function copyToClipboard() {
            const textarea = document.getElementById('exportTextarea');
            textarea.select();
            navigator.clipboard.writeText(textarea.value).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        function getTypeLabel(type) {
            const map = { text: '文本', textarea: '多行文本', radio: '单选', checkbox: '多选', select: '下拉', rating: '评分', email: '邮箱', number: '数字' };
            return map[type] || type;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
