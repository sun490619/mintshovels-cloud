<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CSS Computed Property Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;padding:40px 20px}
.container{max-width:850px;width:100%}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:12px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
label{font-size:13px;color:#8b949e;min-width:70px}
input,select{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:13px;outline:none}
input:focus,select:focus{border-color:#58a6ff}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
th{background:#21262d;padding:10px 14px;text-align:left;font-weight:600;color:#8b949e;font-size:12px;border-bottom:2px solid #30363d;position:sticky;top:0}
td{padding:8px 14px;border-bottom:1px solid #21262d;font-family:'SF Mono',Monaco,monospace}
tr:hover td{background:#1c2128}
td.prop-name{color:#79c0ff}td.prop-value{color:#a5d6ff;word-break:break-all}
td.prop-source{color:#8b949e;font-size:11px}
td.computed{color:#3fb950}td.inherited{color:#d29922}td.default{color:#484f58}
.preview-area{background:#fff;border-radius:8px;padding:20px;min-height:60px;margin:10px 0}
.preview-area .test-element{padding:15px;font-size:14px;text-align:center}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px}
.btn:hover{background:#2ea043}
.btn.secondary{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.secondary:hover{background:#30363d}
.btn.small{font-size:11px;padding:5px 10px}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.filter-row{display:flex;gap:8px;margin:10px 0}
.filter-row input{flex:1}
</style>
</head>
<body>
<div class="container">
<h1>🎨 CSS 计算属性分析器</h1>
<p class="sub">输入 CSS 属性和选择器 → 查看元素的计算值来源（继承/默认/直接设置）</p>

<div class="preview-area">
<div class="test-element" id="testElement" contenteditable="true"
 style="color:#333;font-size:16px;font-family:Arial;padding:20px;background:#f0f0f0;border:2px solid #007acc;border-radius:8px;text-align:center;margin:0">
  👆 这是被分析的目标元素<br>
  <small style="font-size:12px;color:#666">可以直接在样式面板编辑属性</small>
</div>
</div>

<div class="box">
<div class="row">
<label>CSS 属性:</label>
<input type="text" id="propInput" placeholder="color, font-size, margin..." value="color,font-size,padding,border-width,background-color,text-align,font-family,border-radius,margin"
 style="width:100%;max-width:500px">
<button class="btn" onclick="analyze()">🔍 分析</button>
</div>
<div class="row">
<label>快速填充:</label>
<button class="btn secondary small" onclick="document.getElementById('propInput').value='color,font-size,font-family,font-weight,line-height,text-align';analyze()">文字相关</button>
<button class="btn secondary small" onclick="document.getElementById('propInput').value='margin,padding,border-width,border-color,border-radius,width,height,display,position';analyze()">布局相关</button>
<button class="btn secondary small" onclick="document.getElementById('propInput').value='background-color,color,background-image,opacity,box-shadow';analyze()">外观相关</button>
</div>
</div>

<div class="box">
<h3>📊 分析结果</h3>
<div style="overflow-x:auto;max-height:450px;overflow-y:auto">
<table><thead><tr><th>属性名</th><th>计算值</th><th>来源</th></tr></thead>
<tbody id="resultBody"><tr><td colspan="3" style="text-align:center;color:#484f58">点击"分析"按钮</td></tr></tbody></table>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
function analyze(){
  let el=document.getElementById('testElement');
  let props=document.getElementById('propInput').value.split(',').map(p=>p.trim()).filter(Boolean);
  let computed=getComputedStyle(el);
  let tbody=document.getElementById('resultBody');
  let html='';

  props.forEach(prop=>{
    let val=computed.getPropertyValue(prop);
    // Determine source
    let source='computed';
    let sourceClass='computed';
    let sourceLabel='📐 计算值';

    // Check if it's from inline style
    if(el.style[prop.replace(/-([a-z])/g,(m,c)=>c.toUpperCase())]){
      sourceClass='computed';
      sourceLabel='✏️ 内联样式';
    }
    // Check if it's the default
    else{
      // Create temp element to check default
      let temp=document.createElement('div');
      document.body.appendChild(temp);
      let def=getComputedStyle(temp).getPropertyValue(prop);
      document.body.removeChild(temp);
      if(val===def&&prop!=='color'){
        sourceClass='default';
        sourceLabel='📄 浏览器默认';
      }
    }

    html+=`<tr><td class="prop-name">${prop}</td><td class="prop-value">${val}</td><td class="${sourceClass}">${sourceLabel}</td></tr>`;
  });
  tbody.innerHTML=html;
  showToast(`分析了 ${props.length} 个属性`);
}

function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
analyze();
</script>
</body>
</html>
