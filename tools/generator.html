<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator - 生成器 | MintShovels</title>
    <meta name="description" content="UUID, password, and random string generator. One-click generation, copy to clipboard. Free online tool.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 24px; }
        .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(99,102,241,0.3); }
        .btn-secondary { background:#27272a; color:#d4d4d8; border:1px solid #3f3f46; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-secondary:hover { background:#3f3f46; }
        input, textarea { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:10px 14px; color:#fafafa; font-size:14px; width:100%; }
        input:focus, textarea:focus { outline:none; border-color:#6366f1; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto">
        <a href="../index.html" class="text-zinc-500 hover:text-white text-sm mb-6 inline-block">← MintShovels</a>
        <div class="card mb-6">
            <div class="text-5xl mb-4">🧩</div>
            <h1 class="text-2xl font-bold">Generator</h1>
            <p class="text-zinc-400">生成器</p>
            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                Shovel #029 · 🔧 Web Tool
            </span>
        </div>
        <div class="card">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <button class="btn-secondary" onclick="genType='uuid';generate()">🆔 UUID</button>
                <button class="btn-secondary" onclick="genType='password';generate()">🔑 密码</button>
                <button class="btn-secondary" onclick="genType='hex';generate()">🎨 HEX色</button>
                <button class="btn-secondary" onclick="genType='nanoid';generate()">🔤 Nano ID</button>
            </div>
            <div class="flex items-center gap-2 mb-4">
                <label class="text-xs text-zinc-500 whitespace-nowrap">数量:</label>
                <input id="count" type="number" value="5" min="1" max="100" class="w-20 text-center" onchange="generate()">
                <label class="text-xs text-zinc-500 whitespace-nowrap ml-2">长度:</label>
                <input id="length" type="number" value="16" min="4" max="64" class="w-20 text-center" onchange="generate()">
            </div>
            <div id="results" class="space-y-2 max-h-96 overflow-y-auto"></div>
            <button class="btn-primary mt-4 text-xs" onclick="copyAll()">📋 复制全部</button>
        </div>
        <script>
            let genType = 'uuid';
            const resultsEl = document.getElementById('results');
            const countEl = document.getElementById('count');
            const lengthEl = document.getElementById('length');

            const CHAR_SETS = {
                hex: '0123456789ABCDEF',
                password: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*',
                nanoid: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-',
            };

            function rng(n) { const a = new Uint32Array(1); crypto.getRandomValues(a); return a[0] % n; }
            function genStr(chars, len) { let s=''; for(let i=0;i<len;i++) s+=chars[rng(chars.length)]; return s; }

            function generate() {
                const count = parseInt(countEl.value) || 5;
                const len = parseInt(lengthEl.value) || 16;
                const items = [];
                for (let i = 0; i < count; i++) {
                    let v;
                    if (genType === 'uuid') v = crypto.randomUUID();
                    else if (genType === 'hex') v = '#' + genStr(CHAR_SETS.hex, 6);
                    else v = genStr(CHAR_SETS[genType], len);
                    items.push(v);
                }
                resultsEl.innerHTML = items.map((v,i) =>
                    `<div class="flex items-center gap-2 bg-zinc-800/50 rounded-lg px-3 py-2">
                        <span class="text-xs text-zinc-600 w-6">#${i+1}</span>
                        <span class="font-mono text-sm text-emerald-400 flex-1 break-all">${v}</span>
                        <button class="text-xs text-zinc-600 hover:text-white" onclick="copyOne('${v.replace(/'/g,"\\'")}')">📋</button>
                    </div>`
                ).join('');
            }

            function copyOne(s) { navigator.clipboard.writeText(s); }
            function copyAll() {
                const items = [...resultsEl.querySelectorAll('.font-mono')].map(el => el.textContent);
                navigator.clipboard.writeText(items.join('\n'));
            }

            generate();
        </script>
    </div>
</body>
</html>
