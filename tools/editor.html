<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - 编辑器 | MintShovels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 24px; }
        .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(99,102,241,0.3); }
        .btn-secondary { background:#27272a; color:#d4d4d8; border:1px solid #3f3f46; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-secondary:hover { background:#3f3f46; }
        input, textarea { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:10px 14px; color:#fafafa; font-size:14px; width:100%; }
        input:focus, textarea:focus { outline:none; border-color:#6366f1; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto">
        <a href="../index.html" class="text-zinc-500 hover:text-white text-sm mb-6 inline-block">← MintShovels</a>
        <div class="card mb-6">
            <div class="text-5xl mb-4">💼</div>
            <h1 class="text-2xl font-bold">Editor</h1>
            <p class="text-zinc-400">编辑器</p>
            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                Shovel #052 · 🔧 Web Tool
            </span>
        </div>
        <div class="card">
            <div class="space-y-4">
    <textarea id="tool-input" rows="6" placeholder="输入内容..." class="w-full"></textarea>
    <button onclick="runTool()" class="btn-primary">▶️ 运行</button>
    <div id="tool-result"></div>
</div>
        </div>
        <script>function runTool() {
    const input = document.getElementById('tool-input').value.trim();
    const result = document.getElementById('tool-result');
    if (!input) { result.innerHTML = '<p class="text-amber-400">请输入内容</p>'; return; }
    const lines = input.split('\n').filter(l => l.trim());
    const chars = input.replace(/\s/g, '').length;
    const words = input.match(/\b\w+\b/g) || [];
    const stats = lines.map((l, i) => `${i + 1}. ${l.substring(0, 80)}${l.length > 80 ? '...' : ''}`);
    result.innerHTML = `<div class="space-y-3">
        <div class="flex gap-4 flex-wrap">
            <div class="bg-zinc-800 px-4 py-2 rounded-lg"><span class="text-zinc-500 text-xs">字符数</span><p class="text-emerald-400 font-bold">${input.length}</p></div>
            <div class="bg-zinc-800 px-4 py-2 rounded-lg"><span class="text-zinc-500 text-xs">非空字符</span><p class="text-emerald-400 font-bold">${chars}</p></div>
            <div class="bg-zinc-800 px-4 py-2 rounded-lg"><span class="text-zinc-500 text-xs">行数</span><p class="text-emerald-400 font-bold">${lines.length}</p></div>
            <div class="bg-zinc-800 px-4 py-2 rounded-lg"><span class="text-zinc-500 text-xs">单词数</span><p class="text-emerald-400 font-bold">${words.length}</p></div>
        </div>
        <div class="bg-zinc-900 rounded-lg p-3 max-h-64 overflow-y-auto"><pre class="text-xs text-zinc-300 whitespace-pre-wrap">${stats.join('\n')}</pre></div>
    </div>`;
    const exportBtn = document.createElement('button');
    exportBtn.className = 'btn-secondary mt-3';
    exportBtn.textContent = '📥 导出';
    exportBtn.onclick = function() {
        const blob = new Blob([result.innerText], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'output.txt';
        a.click();
    };
    result.appendChild(exportBtn);
}</script>
    </div>
</body>
</html>
