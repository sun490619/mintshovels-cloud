<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Human Typing Macro Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:40px 20px}
.container{max-width:800px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:6px}
.sub{font-size:13px;color:#8b949e;margin-bottom:24px}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.box h3{font-size:14px;color:#8b949e;margin-bottom:10px}
textarea{width:100%;min-height:100px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;color:#c9d1d9;font-family:'SF Mono',Monaco,monospace;font-size:13px;resize:vertical;outline:none}
textarea:focus{border-color:#58a6ff}
.row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end}
.row label{font-size:12px;color:#8b949e;display:block;margin-bottom:4px}
.row input{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#c9d1d9;font-size:13px;outline:none;width:100px}
.row input:focus{border-color:#58a6ff}
select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;font-size:13px;outline:none}
.sim-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:16px;font-family:'SF Mono',Monaco,monospace;font-size:14px;min-height:50px;white-space:pre-wrap;margin:10px 0;position:relative;overflow:hidden}
.sim-box .cursor{display:inline-block;width:8px;height:18px;background:#58a6ff;vertical-align:text-bottom;animation:blink .8s infinite}
@keyframes blink{50%{opacity:0}}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;margin-right:8px;margin-top:8px}
.btn:hover{background:#2ea043}
.btn.s{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn.s:hover{background:#30363d}
pre{background:#0d1117;border:1px solid #3fb950;border-radius:6px;padding:14px;font-size:12px;overflow:auto;max-height:300px;font-family:'SF Mono',Monaco,monospace;line-height:1.5;white-space:pre}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin-left:6px}
.badge.py{background:#1e3a1e;color:#3fb950}.badge.ahk{background:#3a1e1e;color:#ff7b72}.badge.js{background:#1e2e3a;color:#58a6ff}
.toast{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.type-demo{font-size:13px;color:#a5d6ff}
</style>
</head>
<body>
<div class="container">
<h1>⌨️ Human Typing Macro Generator</h1>
<p class="sub">输入文字 → 生成模拟真人打字节奏的脚本（随机延迟 + 变速率）</p>

<div class="box">
<textarea id="input" placeholder="输入需要模拟打字的文本...
例如: Hello World! This is a typing simulation.">Hello World! This is a typing simulation with randomized delays. It looks like a real human is typing, not pasting!</textarea>
<div class="row">
<div><label>最小延迟(ms)</label><input type="number" id="minDelay" value="40" min="10"></div>
<div><label>最大延迟(ms)</label><input type="number" id="maxDelay" value="200" min="20"></div>
<div><label>格式</label><select id="format"><option value="python">Python (pyautogui)</option><option value="ahk">AutoHotkey</option><option value="js">JavaScript</option></select></div>
<button class="btn" onclick="generate()">⚡ 生成脚本</button>
</div>
</div>

<div class="box">
<h3>🎬 模拟演示</h3>
<div class="sim-box" id="simDemo"><span style="color:#484f58">点击生成后此处会模拟真人打字效果</span></div>
<button class="btn s" onclick="simulate()">▶ 播放模拟</button>
</div>

<div class="box">
<h3>📜 生成的脚本</h3>
<pre id="output">点击"生成"按钮...</pre>
<button class="btn s" onclick="copyResult()">📋 复制脚本</button>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
function generate(){
  let text=document.getElementById('input').value;
  let min=parseInt(document.getElementById('minDelay').value)||30;
  let max=parseInt(document.getElementById('maxDelay').value)||150;
  let fmt=document.getElementById('format').value;
  let code='';

  if(fmt==='python'){
code=`import pyautogui
import time
import random

text = """${text}"""
min_delay = ${min}/1000  # 秒
max_delay = ${max}/1000

print("3秒后开始输入...")
time.sleep(3)

for char in text:
    pyautogui.typewrite(char)
    delay = random.uniform(min_delay, max_delay)
    time.sleep(delay)

print("输入完成!")
`;
  }else if(fmt==='ahk'){
code=`#SingleInstance, Force
text := "
${text.replace(/`/g,'``').replace(/%/g,'`%').replace(/,/g,'`,')}
"
Loop, Parse, text
{
    SendInput, %A_LoopField%
    Random, delay, ${min}, ${max}
    Sleep, delay
}
MsgBox, 输入完成!
`;
  }else if(fmt==='js'){
code=`// 粘贴到浏览器控制台使用（需要页面有焦点元素）
const text = \`${text}\`;
const minDelay = ${min};
const maxDelay = ${max};

async function typeHuman(input) {
  for (const char of text) {
    // 模拟按键
    const event = new KeyboardEvent('keydown', { key: char, bubbles: true });
    document.activeElement?.dispatchEvent(event);
    
    if (document.activeElement?.value !== undefined) {
      document.activeElement.value += char;
    }
    
    // 随机延迟
    const delay = Math.floor(Math.random() * (maxDelay - minDelay) + minDelay);
    await new Promise(r => setTimeout(r, delay));
  }
  console.log('输入完成!');
}

typeHuman();
`;
  }

  document.getElementById('output').textContent=code;
  showToast('脚本已生成!');
}

async function simulate(){
  let text=document.getElementById('input').value;
  let min=parseInt(document.getElementById('minDelay').value)||30;
  let max=parseInt(document.getElementById('maxDelay').value)||150;
  let demo=document.getElementById('simDemo');
  let displayed='';

  for(let i=0;i<text.length;i++){
    displayed+=text[i];
    demo.innerHTML=`<span class="type-demo">${displayed}</span><span class="cursor"></span>`;
    let delay=Math.floor(Math.random()*(max-min)+min);
    await new Promise(r=>setTimeout(r,delay));
  }
  demo.innerHTML=`<span class="type-demo">${displayed}</span> ✅ 输入完成!`;
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  showToast('脚本已复制!');
}
function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',1500);
}
generate();
</script>
</body>
</html>
