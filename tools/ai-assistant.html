<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI business opportunity catcher - describe your tool need, and MintShovels auto-factory will build it for you. Free custom tool requests.">
<title>AI 商机捕手 · MintShovels</title>
<style>
:root {
  --bg: #09090b; --bg-card: #18181b; --bg-input: #27272a;
  --border: #27272a; --text: #fafafa; --text-muted: #a1a1aa;
  --brand: #6366f1; --brand-light: #8b5cf6; --success: #22c55e;
  --radius: 12px; --radius-lg: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}
/* Header */
.tool-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-card); display: flex; align-items: center; gap: 12px;
}
.tool-header .back-link {
  color: var(--text-muted); text-decoration: none; font-size: 13px;
  display: flex; align-items: center; gap: 4px;
}
.tool-header .back-link:hover { color: var(--text); }
.tool-header .badge {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  background: rgba(99,102,241,0.15); color: var(--brand-light);
  border: 1px solid rgba(99,102,241,0.3);
}
.tool-header .title { font-weight: 600; font-size: 15px; }
/* Chat Container */
.chat-container {
  flex: 1; display: flex; flex-direction: column;
  max-width: 700px; width: 100%; margin: 0 auto; padding: 0 16px;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px 0;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
/* Message Bubbles */
.message { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.message.bot { align-self: flex-start; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message .avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 18px;
  flex-shrink: 0;
}
.message.bot .avatar { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
.message.user .avatar { background: #3f3f46; }
.message .bubble {
  max-width: 75%; padding: 12px 16px; border-radius: var(--radius-lg);
  font-size: 14px; line-height: 1.6;
}
.message.bot .bubble {
  background: var(--bg-card); border: 1px solid var(--border);
  border-top-left-radius: 4px;
}
.message.user .bubble {
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  border-top-right-radius: 4px;
}
/* Typing Indicator */
.typing-indicator {
  display: flex; gap: 4px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); width: fit-content;
}
.typing-indicator span {
  width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100% { opacity:0.3; transform:translateY(0); } 30% { opacity:1; transform:translateY(-4px); } }
/* Quick Actions */
.quick-actions {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
}
.quick-btn {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-muted); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.quick-btn:hover {
  border-color: var(--brand); color: var(--text);
  background: rgba(99,102,241,0.1);
}
/* Input Area */
.chat-input-area {
  padding: 16px 0; border-top: 1px solid var(--border);
  display: flex; gap: 10px;
}
.chat-input-area input {
  flex: 1; padding: 12px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.chat-input-area input:focus { border-color: var(--brand); }
.chat-input-area input::placeholder { color: #52525b; }
.send-btn {
  width: 44px; height: 44px; border-radius: var(--radius);
  border: none; background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: white; font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
/* Status Banner */
.status-banner {
  text-align: center; padding: 12px; margin: 12px 0; border-radius: var(--radius);
  font-size: 13px; animation: fadeIn 0.3s ease;
}
.status-banner.success {
  background: rgba(34,197,94,0.1); color: var(--success);
  border: 1px solid rgba(34,197,94,0.2);
}
.status-banner.info {
  background: rgba(99,102,241,0.1); color: var(--brand-light);
  border: 1px solid rgba(99,102,241,0.2);
}
/* Scrollbar */
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
</style>
</head>
<body>

<!-- Tool Header -->
<div class="tool-header">
  <a href="../index.html" class="back-link">← MintShovels</a>
  <span class="badge">#024 · 商机捕手</span>
  <span class="title">AI 商机捕手</span>
</div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
  <div class="chat-messages" id="chatMessages"></div>
  <div id="statusArea"></div>
  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="说说你想做什么工具…" 
           autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// AI 商机捕手 v1.0 — 对话引擎 + 痛点回传
// ═══════════════════════════════════════════════════

const API_BASE = (() => {
  // 优先使用全局 API 配置
  if (typeof window.API_BASE !== 'undefined' && window.API_BASE) {
    return window.API_BASE;
  }
  const host = window.location.hostname;
  if (host === 'localhost' || host === '127.0.0.1') {
    return 'http://localhost:8000';
  }
  return 'https://efficient-reverence-production-1b4a.up.railway.app';
})();

let sessionStage = 'idle'; // idle → greet → probe → confirm → done
let sessionQuery = '';
let sessionPainPoints = [];
let sessionToolIdea = '';
let isProcessing = false;

const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusArea = document.getElementById('statusArea');

// ── 工具名称生成器 ──
function generateToolName(description) {
  const d = description.toLowerCase();
  const patterns = [
    { match: /excel.*(?:图|png|jpg|图片|image)/, zh: 'Excel转图片批量转换器', en: 'Excel to Image Batch Converter' },
    { match: /word.*pdf|pdf.*word|文档.*转换/, zh: 'Word/PDF互转工具', en: 'Word PDF Converter' },
    { match: /json.*(?:格式化|format|美化|beautify)/, zh: 'JSON格式化美化器', en: 'JSON Formatter & Beautifier' },
    { match: /(?:视频|video).*(?:压缩|compress|转|convert)/, zh: '视频格式转换压缩器', en: 'Video Converter & Compressor' },
    { match: /(?:图片|image).*(?:压缩|compress|批量|batch)/, zh: '图片批量压缩工具', en: 'Image Batch Compressor' },
    { match: /(?:二维码|QR|qrcode).*(?:生成|generate|解码|decode)/, zh: '二维码生成解码器', en: 'QR Code Generator & Decoder' },
    { match: /(?:颜色|color|调色|palette).*(?:提取|生成|配色)/, zh: '智能配色方案生成器', en: 'Smart Color Palette Generator' },
    { match: /(?:文本|text).*(?:比对|diff|对比|compare)/, zh: '文本差异比对工具', en: 'Text Diff Comparator' },
    { match: /(?:正则|regex|regexp).*(?:测试|test|生成|generate)/, zh: '正则表达式测试器', en: 'Regex Tester & Generator' },
    { match: /(?:时间戳|timestamp).*(?:转换|convert)/, zh: '时间戳转换器', en: 'Timestamp Converter' },
    { match: /(?:表格|table).*(?:图|image|png|图片)/, zh: '表格转图片工具', en: 'Table to Image Converter' },
    { match: /(?:音频|audio|mp3).*(?:转|convert|提取|extract)/, zh: '音频格式转换器', en: 'Audio Format Converter' },
    { match: /(?:编码|encode|decode|base64|url.*编码)/, zh: '编码解码工具箱', en: 'Encode/Decode Toolkit' },
    { match: /(?:密码|password).*(?:生成|generate|随机|random)/, zh: '随机密码生成器', en: 'Random Password Generator' },
    { match: /(?:markdown|md).*(?:预览|preview|转|convert)/, zh: 'Markdown实时预览编辑器', en: 'Markdown Live Preview Editor' },
  ];
  for (const p of patterns) {
    if (p.match.test(d)) return p;
  }
  // fallback: generic name
  const keywords = description.replace(/[，。！？、\s]/g, ' ').split(' ').filter(w => w.length > 1).slice(0, 3);
  const zhName = keywords.join('') + '处理工具';
  return { zh: zhName, en: keywords.join(' ') + ' Tool' };
}

// ── 跟进问题生成 ──
function generateFollowUps(stage) {
  if (stage === 'probe') {
    return [
      '输入什么格式？输出什么格式？',
      '需要批量处理还是单个处理？',
      '有没有特殊要求？比如保留样式、水印等',
    ];
  }
  if (stage === 'confirm') {
    return ['确认无误，提交需求', '我再补充一点细节', '重新描述我的需求'];
  }
  return [];
}

// ── 渲染消息 ──
function addMessage(role, content, quickActions = []) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🤖' : '👤';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = content.replace(/\n/g, '<br>');
  
  if (quickActions.length > 0) {
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'quick-actions';
    quickActions.forEach((qa, i) => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = qa;
      btn.onclick = () => handleQuickAction(qa);
      actionsDiv.appendChild(btn);
    });
    bubble.appendChild(actionsDiv);
  }
  
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── 显示输入状态 ──
function showTyping(callback, delay = 1200) {
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot';
  typingDiv.id = 'typingMsg';
  typingDiv.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>
  `;
  chatMessages.appendChild(typingDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  
  setTimeout(() => {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
    callback();
  }, delay);
}

// ── 状态横幅 ──
function showStatus(text, type = 'info') {
  statusArea.innerHTML = `<div class="status-banner ${type}">${text}</div>`;
  setTimeout(() => { statusArea.innerHTML = ''; }, 4000);
}

// ── 快捷操作处理 ──
function handleQuickAction(action) {
  if (isProcessing) return;
  if (action === '确认无误，提交需求') {
    submitPainPoint();
    return;
  }
  if (action === '重新描述我的需求') {
    resetSession();
    return;
  }
  userInput.value = action;
  sendMessage();
}

// ── 重置会话 ──
function resetSession() {
  sessionStage = 'idle';
  sessionQuery = '';
  sessionPainPoints = [];
  sessionToolIdea = '';
  isProcessing = false;
  chatMessages.innerHTML = '';
  statusArea.innerHTML = '';
  startGreeting();
}

// ── 开始会话 ──
function startGreeting(query = '') {
  const q = query || sessionQuery || '';
  showTyping(() => {
    if (q) {
      addMessage('bot', `嗨！搜不到<b>"${escapeHtml(q)}"</b>相关的工具对吧？<br><br>没关系，跟我说说你想具体解决什么问题？我帮你让后台直接定制！`);
    } else {
      addMessage('bot', '嗨！👋 我是 MintShovels 的 AI 商机捕手。<br><br>找不到合适的工具？跟我聊聊你的需求，我会帮你把需求直接送到生产线，优先为你定制！<br><br>你现在想做什么？');
    }
    sessionStage = 'probe';
  });
}

// ── 发送消息 ──
function sendMessage() {
  if (isProcessing) return;
  const text = userInput.value.trim();
  if (!text) return;
  
  isProcessing = true;
  sendBtn.disabled = true;
  
  addMessage('user', text);
  sessionPainPoints.push(text);
  userInput.value = '';
  
  processMessage(text);
}

// ── 消息处理引擎 ──
function processMessage(text) {
  showTyping(() => {
    if (sessionStage === 'probe') {
      // 第一轮探测 — 生成工具名称并确认
      const toolName = generateToolName(text);
      sessionToolIdea = `${toolName.zh} / ${toolName.en}`;
      addMessage('bot', 
        `明白了！你需要的应该是一个：<br><br>🎯 <b>${toolName.zh}</b><br>📝 ${toolName.en}<br><br>` +
        `在正式提交到生产线之前，再跟我说说更多细节？比如：<br>` +
        `• 输入的是什么格式？<br>• 希望输出什么？<br>• 有没有特殊要求？`,
        generateFollowUps('probe')
      );
      sessionStage = 'confirm';
    } else if (sessionStage === 'confirm') {
      // 第二轮确认 — 总结后询问是否提交
      const summary = sessionPainPoints.join(' → ');
      addMessage('bot',
        `好的，我帮你总结一下需求：<br><br>` +
        `📋 <b>核心痛点</b>：${escapeHtml(summary)}<br>` +
        `🔧 <b>建议工具</b>：${escapeHtml(sessionToolIdea)}<br><br>` +
        `确认无误的话，我现在就把它作为<b>最高优先级</b>订单提交到 MintShovels 生产线！`,
        generateFollowUps('confirm')
      );
    }
    isProcessing = false;
    sendBtn.disabled = false;
  });
}

// ── 提交痛点到后端 ──
async function submitPainPoint() {
  if (isProcessing) return;
  isProcessing = true;
  sendBtn.disabled = true;
  
  const toolName = generateToolName(sessionPainPoints.join(' '));
  const painSummary = sessionPainPoints.join('；');
  
  showTyping(() => {
    addMessage('bot', '⏳ 正在将你的需求提交到雷达系统…');
  }, 800);
  
  try {
    const resp = await fetch(`${API_BASE}/v1/pain-point`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: sessionQuery || sessionPainPoints[0] || '',
        conversation: sessionPainPoints.map((p, i) => ({
          role: i % 2 === 0 ? 'user' : 'assistant',
          content: p
        })),
        pain_summary: painSummary,
        tool_idea: sessionToolIdea || `${toolName.zh} / ${toolName.en}`,
        category: 'custom',
        source: 'ai-assistant'
      })
    });
    
    const data = await resp.json();
    
    if (resp.ok) {
      addMessage('bot',
        `✅ <b>需求已成功提交到生产线！</b><br><br>` +
        `📊 状态：<span style="color:#22c55e">最高优先级排队中</span><br>` +
        `🔧 工具：${escapeHtml(sessionToolIdea)}<br>` +
        `📡 下轮雷达扫描将优先处理<br><br>` +
        `感谢你的反馈，我们会尽快为你打造这个工具！🚀`
      );
      showStatus('✅ 痛点已入雷达队列 — 最高优先级', 'success');
    } else {
      throw new Error(data.message || '提交失败');
    }
  } catch (e) {
    addMessage('bot',
      `⚠️ 网络有点问题，但你的需求我已经记下来了。<br><br>` +
      `你也可以直接发邮件告诉我们：<br>📧 sun490619@gmail.com<br><br>` +
      `主题请写：<b>工具定制: ${escapeHtml(sessionToolIdea || painSummary)}</b>`
    );
    showStatus('⚠️ 网络提交失败，但本地已记录', 'info');
  }
  
  sessionStage = 'done';
  isProcessing = false;
  sendBtn.disabled = false;
}

// ── HTML转义 ──
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════════════════
// 🔗 iframe 通信 — 接收父页面搜索通知
// ═══════════════════════════════════════════════════
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'search-no-results' && event.data.query) {
    const q = event.data.query.trim();
    if (q && sessionStage === 'idle') {
      sessionQuery = q;
      startGreeting(q);
    }
  }
});

// ── 启动入口 ──
document.addEventListener('DOMContentLoaded', () => {
  // 检查是否从父页面收到搜索词(通过URL参数)
  const params = new URLSearchParams(window.location.search);
  const urlQuery = params.get('q');
  if (urlQuery) {
    sessionQuery = urlQuery;
    startGreeting(urlQuery);
    return;
  }
  
  // 独立模式 — 显示欢迎
  startGreeting();
});
</script>
</body>
</html>
