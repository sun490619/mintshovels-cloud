<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor - PDF编辑器 | MintShovels</title>
    <meta name="description" content="Edit, merge, split and compress PDF files online. No watermarks, no signup. Free PDF toolkit.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 24px; }
        .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(99,102,241,0.3); }
        .btn-secondary { background:#27272a; color:#d4d4d8; border:1px solid #3f3f46; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-secondary:hover { background:#3f3f46; }
        input, textarea { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:10px 14px; color:#fafafa; font-size:14px; width:100%; }
        input:focus, textarea:focus { outline:none; border-color:#6366f1; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto">
        <a href="../index.html" class="text-zinc-500 hover:text-white text-sm mb-6 inline-block">← MintShovels</a>
        <div class="card mb-6">
            <div class="text-5xl mb-4">💼</div>
            <h1 class="text-2xl font-bold">PDF Editor</h1>
            <p class="text-zinc-400">PDF编辑器</p>
            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                Shovel #026 · 🔧 Web Tool
            </span>
        </div>
        <div class="card">
            <label class="block mb-3">
                <span class="text-sm text-zinc-400">📄 选择 PDF 文件（纯前端处理，不传服务器）</span>
                <input type="file" id="pdfFile" accept=".pdf" class="mt-2">
            </label>
            <div id="pdfInfo" class="hidden space-y-2 mb-4">
                <h3 class="text-sm font-semibold text-zinc-300">📊 文件信息</h3>
                <div id="pdfDetails" class="text-xs text-zinc-500 space-y-1"></div>
            </div>
            <div class="mt-4 flex flex-wrap gap-3">
                <button class="btn-secondary text-xs" onclick="extractPages()">📑 提取页面</button>
                <button class="btn-secondary text-xs" onclick="mergeHint()">🔗 合并提示</button>
                <button class="btn-secondary text-xs" onclick="rotateHint()">🔄 旋转提示</button>
            </div>
            <div id="pdfResult" class="mt-4"></div>
        </div>
        <div class="card mt-4" id="pageList"></div>
        <script>
            const pdfFile = document.getElementById('pdfFile');
            const pdfInfo = document.getElementById('pdfInfo');
            const pdfDetails = document.getElementById('pdfDetails');
            const pdfResult = document.getElementById('pdfResult');
            const pageList = document.getElementById('pageList');
            let pdfBytes = null, pageCount = 0;

            pdfFile.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                pdfBytes = new Uint8Array(await file.arrayBuffer());
                // 解析 PDF 基本信息
                try { pageCount = countPages(pdfBytes); } catch { pageCount = '未知'; }
                pdfInfo.classList.remove('hidden');
                pdfDetails.innerHTML = `
                    <div>📛 文件名: ${file.name}</div>
                    <div>📏 大小: ${(file.size/1024/1024).toFixed(2)} MB</div>
                    <div>📄 页数: ${pageCount}</div>
                    <div>🕐 修改时间: ${new Date(file.lastModified).toLocaleString()}</div>`;
                pageList.innerHTML = '';
            });

            function countPages(bytes) {
                const text = new TextDecoder().decode(bytes.slice(0, 500000));
                const matches = text.match(/\/Type\s*\/Page[^s]/g);
                return matches ? matches.length : 1;
            }

            function extractPages() {
                if (!pdfFile.files[0]) { pdfResult.innerHTML='<p class="text-amber-400 text-sm">⚠️ 请先选择 PDF 文件</p>'; return; }
                pdfResult.innerHTML = `<p class="text-sm text-zinc-400">
                    📑 页面提取需要后端服务支持。当前为纯前端预览模式。<br>
                    💡 你可以在 <a href="../index.html?tool=video-converter" class="text-indigo-400 hover:underline">更多工具</a> 中查找此功能。
                </p>`;
            }

            function mergeHint() {
                pdfResult.innerHTML = `<p class="text-sm text-zinc-400">
                    🔗 PDF 合并提示：使用在线工具如 Smallpdf、iLovePDF，或本地工具如 qpdf、pdftk。<br>
                    <code class="text-xs text-indigo-400">qpdf --empty --pages file1.pdf file2.pdf -- merged.pdf</code>
                </p>`;
            }

            function rotateHint() {
                pdfResult.innerHTML = `<p class="text-sm text-zinc-400">
                    🔄 PDF 旋转提示：<br>
                    <code class="text-xs text-indigo-400">qpdf in.pdf out.pdf --rotate=+90:1-z</code> (所有页顺时针90°)<br>
                    <code class="text-xs text-indigo-400">qpdf in.pdf out.pdf --rotate=180:1</code> (第1页180°)
                </p>`;
            }
        </script>
    </div>
</body>
</html>
