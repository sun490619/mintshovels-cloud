<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="#27272a" stroke-width="1" opacity="0.3">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>
  <!-- Pickaxe icon -->
  <g transform="translate(100, 100)" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="m160 60-100 100"/>
    <path d="m60 60 100 100"/>
    <path d="M240 20l-60 60"/>
    <path d="M220 65l35-35"/>
    <path d="M45 240l60-60"/>
    <path d="M65 200l-35 35"/>
    <path d="M145 145l45 45"/>
  </g>
  <!-- Text -->
  <text x="460" y="200" fill="#fff" font-family="system-ui, sans-serif" font-size="72" font-weight="700">MintShovels</text>
  <text x="460" y="260" fill="url(#accent)" font-family="system-ui, sans-serif" font-size="36" font-weight="600">Gold Shovel Tool Factory</text>
  <text x="460" y="320" fill="#71717a" font-family="system-ui, sans-serif" font-size="24">21 free online tools · No signup · 100% free</text>
