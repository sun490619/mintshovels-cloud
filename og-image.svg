    <rect x="0" y="0" width="130" height="36" rx="18" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <text x="65" y="25" fill="#818cf8" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">🎬 Media</text>
    <rect x="145" y="0" width="130" height="36" rx="18" fill="none" stroke="#fb923c" stroke-width="1.5"/>
    <text x="210" y="25" fill="#fb923c" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">💰 Crypto</text>
    <rect x="290" y="0" width="100" height="36" rx="18" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text x="340" y="25" fill="#34d399" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">💼 Office</text>
    <rect x="405" y="0" width="90" height="36" rx="18" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="450" y="25" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">💻 Dev</text>
    <rect x="510" y="0" width="110" height="36" rx="18" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="565" y="25" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">🤖 AI</text>
